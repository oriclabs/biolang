<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="800" height="520" rx="12" fill="url(#bg)"/>
  <text x="400" y="38" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#0f172a">Multi-Database Annotation Pipeline</text>

  <!-- Gene List -->
  <rect x="310" y="60" width="180" height="48" rx="8" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="400" y="82" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="600" fill="#854d0e">Gene List</text>
  <text x="400" y="98" text-anchor="middle" font-family="system-ui" font-size="11" fill="#92400e">50 genes</text>

  <!-- Parallel queries: three arrows -->
  <line x1="340" y1="108" x2="140" y2="148" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="108" x2="400" y2="148" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="460" y1="108" x2="660" y2="148" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <text x="400" y="137" text-anchor="middle" font-family="system-ui" font-size="10" fill="#64748b">parallel queries</text>

  <!-- NCBI -->
  <rect x="60" y="152" width="160" height="50" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="140" y="174" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="600" fill="#1e40af">NCBI Gene</text>
  <text x="140" y="192" text-anchor="middle" font-family="system-ui" font-size="11" fill="#3b82f6">gene summaries</text>

  <!-- Ensembl -->
  <rect x="320" y="152" width="160" height="50" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="400" y="174" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="600" fill="#1e40af">Ensembl</text>
  <text x="400" y="192" text-anchor="middle" font-family="system-ui" font-size="11" fill="#3b82f6">genomic coords</text>

  <!-- UniProt -->
  <rect x="580" y="152" width="160" height="50" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="660" y="174" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="600" fill="#1e40af">UniProt</text>
  <text x="660" y="192" text-anchor="middle" font-family="system-ui" font-size="11" fill="#3b82f6">protein function</text>

  <!-- Merge arrows -->
  <line x1="140" y1="202" x2="340" y2="248" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="202" x2="400" y2="248" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="660" y1="202" x2="460" y2="248" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Merge -->
  <rect x="310" y="252" width="180" height="45" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="400" y="280" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="600" fill="#166534">Merge Results</text>

  <!-- Second tier queries -->
  <line x1="300" y1="297" x2="110" y2="335" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="370" y1="297" x2="310" y2="335" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="430" y1="297" x2="490" y2="335" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="500" y1="297" x2="660" y2="335" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- KEGG/Reactome -->
  <rect x="30" y="340" width="160" height="50" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="110" y="362" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#5b21b6">KEGG / Reactome</text>
  <text x="110" y="380" text-anchor="middle" font-family="system-ui" font-size="11" fill="#7c3aed">pathway enrichment</text>

  <!-- STRING -->
  <rect x="230" y="340" width="160" height="50" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="310" y="362" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#5b21b6">STRING</text>
  <text x="310" y="380" text-anchor="middle" font-family="system-ui" font-size="11" fill="#7c3aed">interaction network</text>

  <!-- GO -->
  <rect x="420" y="340" width="160" height="50" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="500" y="362" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#5b21b6">GO Annotations</text>
  <text x="500" y="380" text-anchor="middle" font-family="system-ui" font-size="11" fill="#7c3aed">functional terms</text>

  <!-- Placeholder for 4th -->
  <rect x="610" y="340" width="160" height="50" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="4"/>
  <text x="690" y="366" text-anchor="middle" font-family="system-ui" font-size="12" fill="#7c3aed" font-style="italic">additional DBs</text>

  <!-- Final merge arrows -->
  <line x1="110" y1="390" x2="340" y2="430" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="310" y1="390" x2="370" y2="430" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="500" y1="390" x2="430" y2="430" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Annotation Table -->
  <rect x="310" y="435" width="180" height="45" rx="8" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="400" y="462" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="600" fill="#854d0e">Annotation Table</text>

  <!-- Write -->
  <line x1="400" y1="480" x2="400" y2="498" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="400" y="514" text-anchor="middle" font-family="system-ui" font-size="12" fill="#64748b">Write Results (TSV output)</text>
</svg>