<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 920">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="800" height="920" rx="12" fill="url(#bg)"/>
  <text x="400" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#0f172a">Clinical Variant Report Pipeline</text>
  <text x="400" y="62" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#64748b">Seven-stage filtering, annotation, and classification workflow</text>

  <!-- Input boxes row -->
  <rect x="40" y="90" width="200" height="60" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="140" y="115" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#1e40af">INPUT</text>
  <text x="140" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#1e40af">patient.vcf</text>

  <rect x="300" y="90" width="200" height="60" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="400" y="115" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#5b21b6">REFERENCE DATA</text>
  <text x="400" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#5b21b6">gene_db.tsv, clinvar_db.tsv</text>

  <rect x="560" y="90" width="200" height="60" rx="8" fill="#fed7aa" stroke="#f97316" stroke-width="1.5"/>
  <text x="660" y="115" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#9a3412">GENE PANELS</text>
  <text x="660" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#9a3412">cancer_panel.tsv, acmg_genes.tsv</text>

  <!-- Arrow from input down -->
  <line x1="140" y1="150" x2="140" y2="185" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 1: Load & Validate -->
  <rect x="60" y="190" width="300" height="50" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="80" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#1e40af">1. LOAD &amp; VALIDATE</text>

  <line x1="210" y1="240" x2="210" y2="275" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 2: Quality Filter -->
  <rect x="60" y="280" width="300" height="50" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="80" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#1e40af">2. QUALITY FILTER</text>
  <text x="80" y="318" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#1e40af">QUAL >= 30, DP >= 10</text>

  <line x1="210" y1="330" x2="210" y2="365" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Reference data arrow into stage 3 -->
  <line x1="400" y1="150" x2="400" y2="380" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6,3"/>
  <line x1="400" y1="380" x2="365" y2="380" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 3: Annotate -->
  <rect x="60" y="370" width="680" height="50" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="80" y="395" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#5b21b6">3. ANNOTATE</text>
  <text x="200" y="395" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#5b21b6">Join with gene_db and clinvar_db</text>

  <line x1="400" y1="420" x2="400" y2="455" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 4: Frequency Filter -->
  <rect x="60" y="460" width="680" height="50" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="80" y="485" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#166534">4. FREQUENCY FILTER</text>
  <text x="262" y="485" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#166534">Remove common variants (AF > 0.01)</text>

  <line x1="400" y1="510" x2="400" y2="545" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Panel data arrow into stage 5 -->
  <line x1="660" y1="150" x2="660" y2="560" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6,3"/>
  <line x1="660" y1="560" x2="745" y2="560" stroke="#94a3b8" stroke-width="0" />
  <line x1="660" y1="560" x2="630" y2="560" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- Stage 5: Panel Filter -->
  <rect x="60" y="550" width="680" height="50" rx="8" fill="#fed7aa" stroke="#f97316" stroke-width="1.5"/>
  <text x="80" y="575" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#9a3412">5. PANEL FILTER</text>
  <text x="228" y="575" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#9a3412">Keep only variants in cancer panel / ACMG gene list</text>

  <line x1="400" y1="600" x2="400" y2="635" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 6: Classify -->
  <rect x="60" y="640" width="680" height="50" rx="8" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="80" y="665" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#854d0e">6. CLASSIFY (ACMG-inspired)</text>
  <text x="310" y="665" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#854d0e">Pathogenic / Likely Path / VUS / Likely Benign / Benign</text>

  <line x1="400" y1="690" x2="400" y2="725" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 7: Report -->
  <rect x="60" y="730" width="680" height="50" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="80" y="755" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#166534">7. REPORT GENERATION</text>
  <text x="278" y="755" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#166534">Summary statistics, classified variants, QA metrics</text>

  <!-- Output files -->
  <line x1="400" y1="780" x2="400" y2="815" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="200" y="820" width="400" height="55" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="400" y="843" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748b">clinical_report.txt</text>
  <text x="400" y="863" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748b">classified_variants.tsv</text>

  <!-- Step numbers as circles -->
  <circle cx="46" cy="215" r="14" fill="#3b82f6"/>
  <text x="46" y="220" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="white">1</text>
  <circle cx="46" cy="305" r="14" fill="#3b82f6"/>
  <text x="46" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="white">2</text>
  <circle cx="46" cy="395" r="14" fill="#8b5cf6"/>
  <text x="46" y="400" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="white">3</text>
  <circle cx="46" cy="485" r="14" fill="#22c55e"/>
  <text x="46" y="490" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="white">4</text>
  <circle cx="46" cy="575" r="14" fill="#f97316"/>
  <text x="46" y="580" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="white">5</text>
  <circle cx="46" cy="665" r="14" fill="#eab308"/>
  <text x="46" y="670" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="white">6</text>
  <circle cx="46" cy="755" r="14" fill="#22c55e"/>
  <text x="46" y="760" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="white">7</text>
</svg>