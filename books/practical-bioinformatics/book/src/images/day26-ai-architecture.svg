<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="800" height="460" rx="12" fill="url(#bg)"/>
  <text x="400" y="36" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#0f172a">AI-Assisted Analysis Architecture</text>

  <!-- Three function boxes -->
  <rect x="50" y="70" width="200" height="140" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="150" y="96" text-anchor="middle" font-family="system-ui" font-size="15" font-weight="700" fill="#1e40af">chat()</text>
  <line x1="70" y1="105" x2="230" y2="105" stroke="#bfdbfe" stroke-width="1"/>
  <text x="150" y="125" text-anchor="middle" font-family="system-ui" font-size="12" fill="#1e40af">General assistant</text>
  <text x="150" y="145" text-anchor="middle" font-family="system-ui" font-size="11" fill="#3b82f6">Interprets results,</text>
  <text x="150" y="162" text-anchor="middle" font-family="system-ui" font-size="11" fill="#3b82f6">explains biology</text>

  <rect x="300" y="70" width="200" height="140" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="400" y="96" text-anchor="middle" font-family="system-ui" font-size="15" font-weight="700" fill="#166534">chat_code()</text>
  <line x1="320" y1="105" x2="480" y2="105" stroke="#bbf7d0" stroke-width="1"/>
  <text x="400" y="125" text-anchor="middle" font-family="system-ui" font-size="12" fill="#166534">Code generator</text>
  <text x="400" y="145" text-anchor="middle" font-family="system-ui" font-size="11" fill="#22c55e">Returns valid</text>
  <text x="400" y="162" text-anchor="middle" font-family="system-ui" font-size="11" fill="#22c55e">BioLang code only</text>

  <rect x="550" y="70" width="200" height="140" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="650" y="96" text-anchor="middle" font-family="system-ui" font-size="15" font-weight="700" fill="#5b21b6">llm_models()</text>
  <line x1="570" y1="105" x2="730" y2="105" stroke="#ddd6fe" stroke-width="1"/>
  <text x="650" y="125" text-anchor="middle" font-family="system-ui" font-size="12" fill="#5b21b6">Show config</text>
  <text x="650" y="145" text-anchor="middle" font-family="system-ui" font-size="11" fill="#7c3aed">Env vars, provider,</text>
  <text x="650" y="162" text-anchor="middle" font-family="system-ui" font-size="11" fill="#7c3aed">model name</text>

  <!-- Arrows down from chat() and chat_code() -->
  <line x1="150" y1="210" x2="150" y2="260" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="210" x2="400" y2="260" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- LLM Provider box -->
  <rect x="100" y="270" width="600" height="160" rx="10" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="400" y="298" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="700" fill="#854d0e">LLM Provider (auto-detected)</text>
  <line x1="120" y1="308" x2="680" y2="308" stroke="#fde68a" stroke-width="1"/>

  <!-- Provider rows -->
  <text x="200" y="338" text-anchor="middle" font-family="system-ui" font-size="13" fill="#78350f" font-family="monospace">ANTHROPIC_API_KEY</text>
  <text x="370" y="338" text-anchor="middle" font-family="system-ui" font-size="13" fill="#64748b">-></text>
  <rect x="400" y="322" width="120" height="24" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="460" y="339" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#1e40af">Claude</text>

  <text x="200" y="368" text-anchor="middle" font-family="system-ui" font-size="13" fill="#78350f" font-family="monospace">OPENAI_API_KEY</text>
  <text x="370" y="368" text-anchor="middle" font-family="system-ui" font-size="13" fill="#64748b">-></text>
  <rect x="400" y="352" width="120" height="24" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="460" y="369" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#166534">GPT</text>

  <text x="200" y="398" text-anchor="middle" font-family="system-ui" font-size="13" fill="#78350f" font-family="monospace">OLLAMA_MODEL</text>
  <text x="370" y="398" text-anchor="middle" font-family="system-ui" font-size="13" fill="#64748b">-></text>
  <rect x="400" y="382" width="120" height="24" rx="6" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1"/>
  <text x="460" y="399" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#5b21b6">Local</text>

  <text x="200" y="418" text-anchor="middle" font-family="system-ui" font-size="13" fill="#78350f" font-family="monospace">LLM_BASE_URL</text>
  <text x="370" y="418" text-anchor="middle" font-family="system-ui" font-size="13" fill="#64748b">-></text>
  <rect x="400" y="405" width="120" height="18" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="460" y="418" text-anchor="middle" font-family="system-ui" font-size="11" fill="#475569">Custom</text>
</svg>