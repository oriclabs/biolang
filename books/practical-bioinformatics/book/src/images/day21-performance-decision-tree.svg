<svg viewBox="0 0 800 620" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
  </defs>
  <rect width="800" height="620" rx="12" fill="url(#bg)"/>
  <text x="400" y="35" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#0f172a">Performance Optimization Decision Tree</text>

  <!-- Start: Code is slow -->
  <rect x="320" y="55" width="160" height="36" rx="8" fill="#fecaca" stroke="#ef4444" stroke-width="1.5"/>
  <text x="400" y="78" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="600" fill="#991b1b">Code is slow</text>

  <!-- Arrow down -->
  <line x1="400" y1="91" x2="400" y2="110" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="396,108 400,118 404,108" fill="#94a3b8"/>

  <!-- Measure -->
  <rect x="305" y="120" width="190" height="36" rx="18" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="400" y="143" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="600" fill="#854d0e">Measure with :time</text>

  <!-- Arrow down -->
  <line x1="400" y1="156" x2="400" y2="175" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="396,173 400,183 404,173" fill="#94a3b8"/>

  <!-- Where is the time? -->
  <rect x="300" y="185" width="200" height="36" rx="18" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="400" y="208" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="600" fill="#854d0e">Where is the time?</text>

  <!-- Three branches -->
  <!-- Left: I/O: reading files -->
  <line x1="320" y1="221" x2="120" y2="270" stroke="#94a3b8" stroke-width="2"/>
  <text x="190" y="245" font-family="system-ui" font-size="10" fill="#64748b">I/O: files</text>
  <rect x="30" y="272" width="180" height="36" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="120" y="295" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#1e40af">stream_fastq / stream_fasta</text>

  <!-- Center-left: I/O: network -->
  <line x1="360" y1="221" x2="310" y2="270" stroke="#94a3b8" stroke-width="2"/>
  <text x="310" y="252" font-family="system-ui" font-size="10" fill="#64748b">I/O: network</text>
  <rect x="230" y="272" width="160" height="36" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="310" y="295" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#1e40af">async / await_all</text>

  <!-- Center-right: CPU -->
  <line x1="440" y1="221" x2="500" y2="270" stroke="#94a3b8" stroke-width="2"/>
  <text x="480" y="252" font-family="system-ui" font-size="10" fill="#64748b">CPU: map/filter</text>
  <rect x="420" y="272" width="160" height="36" rx="18" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="500" y="295" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#854d0e">Per-element > 1ms?</text>

  <!-- Right: Memory -->
  <line x1="480" y1="221" x2="680" y2="270" stroke="#94a3b8" stroke-width="2"/>
  <text x="610" y="248" font-family="system-ui" font-size="10" fill="#64748b">Memory: OOM</text>
  <rect x="610" y="272" width="160" height="36" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="690" y="295" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#1e40af">Switch to streaming</text>

  <!-- CPU branch: Yes/No -->
  <line x1="460" y1="308" x2="420" y2="345" stroke="#94a3b8" stroke-width="2"/>
  <text x="420" y="330" font-family="system-ui" font-size="10" fill="#22c55e" font-weight="bold">Yes</text>
  <rect x="340" y="348" width="160" height="36" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="420" y="371" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#166534">par_map / par_filter</text>

  <line x1="540" y1="308" x2="580" y2="345" stroke="#94a3b8" stroke-width="2"/>
  <text x="575" y="330" font-family="system-ui" font-size="10" fill="#ef4444" font-weight="bold">No</text>
  <rect x="520" y="348" width="160" height="36" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="600" y="371" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#475569">Keep serial</text>

  <!-- Still slow? -->
  <line x1="120" y1="308" x2="120" y2="420" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4"/>
  <line x1="310" y1="308" x2="310" y2="420" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4"/>
  <line x1="420" y1="384" x2="420" y2="420" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4"/>
  <line x1="690" y1="308" x2="690" y2="420" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4"/>

  <!-- Converge to "Still slow?" -->
  <line x1="120" y1="430" x2="400" y2="430" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="690" y1="430" x2="400" y2="430" stroke="#94a3b8" stroke-width="1.5"/>

  <rect x="320" y="415" width="160" height="36" rx="18" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="400" y="438" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="600" fill="#854d0e">Still slow?</text>

  <!-- Yes: optimize -->
  <line x1="350" y1="451" x2="250" y2="490" stroke="#94a3b8" stroke-width="2"/>
  <text x="275" y="472" font-family="system-ui" font-size="10" fill="#ef4444" font-weight="bold">Yes</text>
  <rect x="120" y="492" width="260" height="36" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="250" y="515" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#6b21a8">Filter early, precompute, batch</text>

  <!-- No: Done -->
  <line x1="450" y1="451" x2="550" y2="490" stroke="#94a3b8" stroke-width="2"/>
  <text x="515" y="472" font-family="system-ui" font-size="10" fill="#22c55e" font-weight="bold">No</text>
  <rect x="510" y="492" width="120" height="36" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="570" y="515" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#166534">Done!</text>

  <!-- Arrow from optimize to done -->
  <line x1="380" y1="510" x2="510" y2="510" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="508,506 518,510 508,514" fill="#94a3b8"/>

  <!-- Legend -->
  <rect x="40" y="560" width="720" height="40" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <rect x="60" y="572" width="14" height="14" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="80" y="584" font-family="system-ui" font-size="11" fill="#475569">Solution</text>
  <rect x="160" y="572" width="14" height="14" rx="7" fill="#fef9c3" stroke="#eab308" stroke-width="1"/>
  <text x="180" y="584" font-family="system-ui" font-size="11" fill="#475569">Decision</text>
  <rect x="270" y="572" width="14" height="14" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="290" y="584" font-family="system-ui" font-size="11" fill="#475569">Success</text>
  <rect x="370" y="572" width="14" height="14" rx="4" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1"/>
  <text x="390" y="584" font-family="system-ui" font-size="11" fill="#475569">Optimization</text>
</svg>
