<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
  </defs>
  <rect width="800" height="560" rx="12" fill="url(#bg)"/>
  <text x="400" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#0f172a">Anatomy of a Volcano Plot</text>
  <text x="400" y="55" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#64748b">Significance vs. effect size for differential expression</text>

  <!-- Plot area -->
  <rect x="120" y="80" width="560" height="380" rx="4" fill="white" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Y axis -->
  <line x1="120" y1="80" x2="120" y2="460" stroke="#334155" stroke-width="1.5"/>
  <text x="50" y="275" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#334155" transform="rotate(-90, 50, 275)">-log10(adjusted p-value)</text>
  <!-- Y ticks -->
  <text x="110" y="457" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b">0</text>
  <text x="110" y="394" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b">2</text>
  <text x="110" y="330" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b">4</text>
  <text x="110" y="267" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b">6</text>

  <!-- X axis -->
  <line x1="120" y1="460" x2="680" y2="460" stroke="#334155" stroke-width="1.5"/>
  <text x="400" y="495" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#334155">log2 Fold Change</text>
  <text x="175" y="478" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b">-4</text>
  <text x="310" y="478" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b">-1</text>
  <text x="400" y="478" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b">0</text>
  <text x="490" y="478" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b">1</text>
  <text x="625" y="478" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b">4</text>

  <!-- FDR threshold line -->
  <line x1="120" y1="394" x2="680" y2="394" stroke="#ef4444" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="690" y="398" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#ef4444">FDR=0.05</text>

  <!-- FC threshold lines -->
  <line x1="310" y1="80" x2="310" y2="460" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="490" y1="80" x2="490" y2="460" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Non-significant dots (gray, center bottom) -->
  <circle cx="350" cy="435" r="3" fill="#94a3b8" opacity="0.5"/>
  <circle cx="370" cy="440" r="3" fill="#94a3b8" opacity="0.5"/>
  <circle cx="390" cy="430" r="3" fill="#94a3b8" opacity="0.5"/>
  <circle cx="410" cy="445" r="3" fill="#94a3b8" opacity="0.5"/>
  <circle cx="430" cy="438" r="3" fill="#94a3b8" opacity="0.5"/>
  <circle cx="360" cy="420" r="3" fill="#94a3b8" opacity="0.5"/>
  <circle cx="380" cy="425" r="3" fill="#94a3b8" opacity="0.5"/>
  <circle cx="400" cy="415" r="3" fill="#94a3b8" opacity="0.5"/>
  <circle cx="420" cy="422" r="3" fill="#94a3b8" opacity="0.5"/>
  <circle cx="340" cy="410" r="3" fill="#94a3b8" opacity="0.5"/>
  <circle cx="440" cy="418" r="3" fill="#94a3b8" opacity="0.5"/>
  <circle cx="365" cy="405" r="3" fill="#94a3b8" opacity="0.5"/>
  <circle cx="385" cy="398" r="3" fill="#94a3b8" opacity="0.5"/>
  <circle cx="415" cy="402" r="3" fill="#94a3b8" opacity="0.5"/>
  <circle cx="355" cy="442" r="3" fill="#94a3b8" opacity="0.5"/>
  <circle cx="395" cy="448" r="3" fill="#94a3b8" opacity="0.5"/>
  <circle cx="425" cy="432" r="3" fill="#94a3b8" opacity="0.5"/>
  <circle cx="445" cy="440" r="3" fill="#94a3b8" opacity="0.5"/>

  <!-- Significantly DOWN-regulated (blue, upper left) -->
  <circle cx="180" cy="200" r="4.5" fill="#3b82f6"/>
  <circle cx="200" cy="170" r="4.5" fill="#3b82f6"/>
  <circle cx="220" cy="240" r="4.5" fill="#3b82f6"/>
  <circle cx="160" cy="260" r="4.5" fill="#3b82f6"/>
  <circle cx="240" cy="180" r="4.5" fill="#3b82f6"/>
  <circle cx="190" cy="300" r="4.5" fill="#3b82f6"/>
  <circle cx="210" cy="150" r="4.5" fill="#3b82f6"/>
  <circle cx="170" cy="320" r="4.5" fill="#3b82f6"/>
  <circle cx="250" cy="280" r="4.5" fill="#3b82f6"/>
  <circle cx="230" cy="350" r="4.5" fill="#3b82f6"/>

  <!-- Significantly UP-regulated (red, upper right) -->
  <circle cx="560" cy="190" r="4.5" fill="#ef4444"/>
  <circle cx="580" cy="160" r="4.5" fill="#ef4444"/>
  <circle cx="540" cy="230" r="4.5" fill="#ef4444"/>
  <circle cx="620" cy="250" r="4.5" fill="#ef4444"/>
  <circle cx="600" cy="140" r="4.5" fill="#ef4444"/>
  <circle cx="550" cy="310" r="4.5" fill="#ef4444"/>
  <circle cx="590" cy="270" r="4.5" fill="#ef4444"/>
  <circle cx="630" cy="180" r="4.5" fill="#ef4444"/>
  <circle cx="570" cy="340" r="4.5" fill="#ef4444"/>
  <circle cx="610" cy="120" r="4.5" fill="#ef4444"/>

  <!-- Quadrant labels -->
  <rect x="130" y="88" width="160" height="28" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="210" y="107" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#1e40af">DOWN-regulated</text>

  <rect x="510" y="88" width="160" height="28" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <text x="590" y="107" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#991b1b">UP-regulated</text>

  <rect x="320" y="430" width="160" height="25" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="400" y="447" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b">Not significant</text>

  <!-- Legend -->
  <rect x="130" y="510" width="540" height="35" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <circle cx="160" cy="528" r="5" fill="#3b82f6"/>
  <text x="175" y="533" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#334155">Sig. down</text>
  <circle cx="290" cy="528" r="5" fill="#94a3b8" opacity="0.5"/>
  <text x="305" y="533" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#334155">Not significant</text>
  <circle cx="440" cy="528" r="5" fill="#ef4444"/>
  <text x="455" y="533" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#334155">Sig. up</text>
  <line x1="540" y1="520" x2="570" y2="520" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="580" y="524" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#334155">FDR threshold</text>
</svg>