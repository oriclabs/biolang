<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="800" height="300" rx="12" fill="url(#bg)"/>
  <text x="400" y="36" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#0f172a">Error Propagation Flow</text>

  <!-- Pipeline box -->
  <rect x="40" y="55" width="720" height="220" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="60" y="78" font-family="system-ui" font-size="14" font-weight="600" fill="#475569">Pipeline</text>

  <!-- Read Input -->
  <rect x="70" y="95" width="130" height="50" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="135" y="118" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="600" fill="#1e40af">Read Input</text>

  <line x1="200" y1="120" x2="240" y2="120" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Validate -->
  <rect x="250" y="95" width="130" height="50" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="315" y="118" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="600" fill="#166534">Validate</text>

  <line x1="380" y1="120" x2="420" y2="120" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Process -->
  <rect x="430" y="95" width="130" height="50" rx="8" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="495" y="118" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="600" fill="#854d0e">Process</text>

  <line x1="560" y1="120" x2="600" y2="120" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Write -->
  <rect x="610" y="95" width="130" height="50" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="675" y="118" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="600" fill="#dc2626">Write Output</text>

  <!-- Error catch arrows pointing down -->
  <line x1="135" y1="145" x2="135" y2="185" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="315" y1="145" x2="315" y2="185" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="495" y1="145" x2="495" y2="185" stroke="#eab308" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="675" y1="145" x2="675" y2="185" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Catch labels -->
  <rect x="60" y="190" width="150" height="40" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="135" y="207" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#3b82f6">catch: skip + log</text>
  <text x="135" y="222" text-anchor="middle" font-family="system-ui" font-size="10" fill="#64748b">"missing"</text>

  <rect x="240" y="190" width="150" height="40" rx="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="315" y="207" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#22c55e">catch: skip + log</text>
  <text x="315" y="222" text-anchor="middle" font-family="system-ui" font-size="10" fill="#64748b">"invalid"</text>

  <rect x="420" y="190" width="150" height="40" rx="6" fill="#fefce8" stroke="#fde68a" stroke-width="1"/>
  <text x="495" y="207" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#ca8a04">catch: skip + log</text>
  <text x="495" y="222" text-anchor="middle" font-family="system-ui" font-size="10" fill="#64748b">"corrupt"</text>

  <rect x="600" y="190" width="150" height="40" rx="6" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
  <text x="675" y="207" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="700" fill="#dc2626">catch: ABORT</text>
  <text x="675" y="222" text-anchor="middle" font-family="system-ui" font-size="10" fill="#64748b">(disk full)</text>

  <!-- Footer -->
  <text x="400" y="254" text-anchor="middle" font-family="system-ui" font-size="12" fill="#475569">Failures accumulate in error log; successes flow to output</text>
</svg>