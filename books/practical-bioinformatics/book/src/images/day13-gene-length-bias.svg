<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg13l" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
  </defs>
  <rect width="800" height="200" rx="12" fill="url(#bg13l)"/>
  <text x="400" y="32" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="bold" fill="#0f172a">Gene Length Bias in Read Counts</text>

  <!-- Gene A: long gene -->
  <text x="40" y="80" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#1e40af">Gene A (10,000 bp)</text>
  <rect x="40" y="88" width="500" height="18" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <!-- Read marks on Gene A -->
  <rect x="55" y="90" width="18" height="14" rx="2" fill="#3b82f6" opacity="0.6"/>
  <rect x="85" y="90" width="18" height="14" rx="2" fill="#3b82f6" opacity="0.6"/>
  <rect x="120" y="90" width="18" height="14" rx="2" fill="#3b82f6" opacity="0.6"/>
  <rect x="155" y="90" width="18" height="14" rx="2" fill="#3b82f6" opacity="0.6"/>
  <rect x="195" y="90" width="18" height="14" rx="2" fill="#3b82f6" opacity="0.6"/>
  <rect x="230" y="90" width="18" height="14" rx="2" fill="#3b82f6" opacity="0.6"/>
  <rect x="265" y="90" width="18" height="14" rx="2" fill="#3b82f6" opacity="0.6"/>
  <rect x="300" y="90" width="18" height="14" rx="2" fill="#3b82f6" opacity="0.6"/>
  <rect x="335" y="90" width="18" height="14" rx="2" fill="#3b82f6" opacity="0.6"/>
  <rect x="370" y="90" width="18" height="14" rx="2" fill="#3b82f6" opacity="0.6"/>
  <rect x="400" y="90" width="18" height="14" rx="2" fill="#3b82f6" opacity="0.6"/>
  <rect x="430" y="90" width="18" height="14" rx="2" fill="#3b82f6" opacity="0.6"/>
  <rect x="455" y="90" width="18" height="14" rx="2" fill="#3b82f6" opacity="0.6"/>
  <rect x="480" y="90" width="18" height="14" rx="2" fill="#3b82f6" opacity="0.6"/>
  <rect x="505" y="90" width="18" height="14" rx="2" fill="#3b82f6" opacity="0.6"/>
  <rect x="60" y="90" width="18" height="14" rx="2" fill="#3b82f6" opacity="0.6"/>
  <rect x="140" y="90" width="18" height="14" rx="2" fill="#3b82f6" opacity="0.6"/>
  <rect x="210" y="90" width="18" height="14" rx="2" fill="#3b82f6" opacity="0.6"/>
  <rect x="350" y="90" width="18" height="14" rx="2" fill="#3b82f6" opacity="0.6"/>
  <rect x="250" y="90" width="18" height="14" rx="2" fill="#3b82f6" opacity="0.6"/>
  <text x="570" y="102" font-family="system-ui,sans-serif" font-size="13" fill="#1e40af">20 reads mapped</text>

  <!-- Gene B: short gene -->
  <text x="40" y="148" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#7c3aed">Gene B (500 bp)</text>
  <rect x="40" y="156" width="80" height="18" rx="4" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <!-- Read marks on Gene B -->
  <rect x="45" y="158" width="18" height="14" rx="2" fill="#8b5cf6" opacity="0.6"/>
  <rect x="65" y="158" width="18" height="14" rx="2" fill="#8b5cf6" opacity="0.6"/>
  <rect x="80" y="158" width="18" height="14" rx="2" fill="#8b5cf6" opacity="0.6"/>
  <rect x="55" y="158" width="18" height="14" rx="2" fill="#8b5cf6" opacity="0.6"/>
  <rect x="95" y="158" width="18" height="14" rx="2" fill="#8b5cf6" opacity="0.6"/>
  <text x="150" y="170" font-family="system-ui,sans-serif" font-size="13" fill="#7c3aed">5 reads mapped</text>

  <!-- Explanation -->
  <text x="400" y="192" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">Gene A has 4x more reads but is 20x longer. Per unit length, Gene B is more highly expressed.</text>
</svg>