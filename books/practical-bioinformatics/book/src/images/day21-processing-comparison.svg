<svg viewBox="0 0 800 580" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
  </defs>
  <rect width="800" height="580" rx="12" fill="url(#bg)"/>
  <text x="400" y="35" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#0f172a">Processing Strategies Compared</text>

  <!-- Serial Processing -->
  <text x="40" y="75" font-family="system-ui" font-size="15" font-weight="bold" fill="#0f172a">Serial Processing</text>
  <line x1="40" y1="82" x2="760" y2="82" stroke="#e2e8f0" stroke-width="1"/>

  <text x="40" y="108" font-family="system-ui" font-size="12" fill="#64748b">Thread 1:</text>
  <rect x="120" y="92" width="70" height="24" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="155" y="108" text-anchor="middle" font-family="system-ui" font-size="10" fill="#1e40af">Read1</text>
  <rect x="194" y="92" width="70" height="24" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="229" y="108" text-anchor="middle" font-family="system-ui" font-size="10" fill="#1e40af">Read2</text>
  <rect x="268" y="92" width="70" height="24" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="303" y="108" text-anchor="middle" font-family="system-ui" font-size="10" fill="#1e40af">Read3</text>
  <rect x="342" y="92" width="70" height="24" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="377" y="108" text-anchor="middle" font-family="system-ui" font-size="10" fill="#1e40af">Read4</text>
  <rect x="416" y="92" width="70" height="24" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="451" y="108" text-anchor="middle" font-family="system-ui" font-size="10" fill="#1e40af">Read5</text>
  <rect x="490" y="92" width="70" height="24" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="525" y="108" text-anchor="middle" font-family="system-ui" font-size="10" fill="#1e40af">Read6</text>
  <rect x="564" y="92" width="70" height="24" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="599" y="108" text-anchor="middle" font-family="system-ui" font-size="10" fill="#1e40af">Read7</text>
  <rect x="638" y="92" width="70" height="24" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="673" y="108" text-anchor="middle" font-family="system-ui" font-size="10" fill="#1e40af">Read8</text>
  <text x="720" y="108" font-family="system-ui" font-size="11" fill="#dc2626" font-weight="bold">Done</text>

  <!-- Parallel Processing -->
  <text x="40" y="165" font-family="system-ui" font-size="15" font-weight="bold" fill="#0f172a">Parallel Processing (4 threads)</text>
  <line x1="40" y1="172" x2="760" y2="172" stroke="#e2e8f0" stroke-width="1"/>

  <text x="40" y="198" font-family="system-ui" font-size="12" fill="#64748b">Thread 1:</text>
  <rect x="120" y="182" width="70" height="24" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="155" y="198" text-anchor="middle" font-family="system-ui" font-size="10" fill="#166534">Read1</text>
  <rect x="194" y="182" width="70" height="24" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="229" y="198" text-anchor="middle" font-family="system-ui" font-size="10" fill="#166534">Read5</text>

  <text x="40" y="222" font-family="system-ui" font-size="12" fill="#64748b">Thread 2:</text>
  <rect x="120" y="206" width="70" height="24" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="155" y="222" text-anchor="middle" font-family="system-ui" font-size="10" fill="#166534">Read2</text>
  <rect x="194" y="206" width="70" height="24" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="229" y="222" text-anchor="middle" font-family="system-ui" font-size="10" fill="#166534">Read6</text>

  <text x="40" y="246" font-family="system-ui" font-size="12" fill="#64748b">Thread 3:</text>
  <rect x="120" y="230" width="70" height="24" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="155" y="246" text-anchor="middle" font-family="system-ui" font-size="10" fill="#166534">Read3</text>
  <rect x="194" y="230" width="70" height="24" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="229" y="246" text-anchor="middle" font-family="system-ui" font-size="10" fill="#166534">Read7</text>

  <text x="40" y="270" font-family="system-ui" font-size="12" fill="#64748b">Thread 4:</text>
  <rect x="120" y="254" width="70" height="24" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="155" y="270" text-anchor="middle" font-family="system-ui" font-size="10" fill="#166534">Read4</text>
  <rect x="194" y="254" width="70" height="24" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="229" y="270" text-anchor="middle" font-family="system-ui" font-size="10" fill="#166534">Read8</text>
  <text x="280" y="242" font-family="system-ui" font-size="11" fill="#dc2626" font-weight="bold">Done (4x faster)</text>

  <!-- Streaming -->
  <text x="40" y="320" font-family="system-ui" font-size="15" font-weight="bold" fill="#0f172a">Streaming (constant memory)</text>
  <line x1="40" y1="327" x2="760" y2="327" stroke="#e2e8f0" stroke-width="1"/>

  <text x="40" y="353" font-family="system-ui" font-size="12" fill="#64748b">Disk</text>
  <polygon points="75,348 85,353 75,358" fill="#94a3b8"/>
  <rect x="90" y="337" width="90" height="24" rx="4" fill="#fef9c3" stroke="#eab308" stroke-width="1"/>
  <text x="135" y="353" text-anchor="middle" font-family="system-ui" font-size="10" fill="#854d0e">Read chunk</text>
  <polygon points="185,348 195,353 185,358" fill="#94a3b8"/>
  <rect x="200" y="337" width="80" height="24" rx="4" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1"/>
  <text x="240" y="353" text-anchor="middle" font-family="system-ui" font-size="10" fill="#6b21a8">Process</text>
  <polygon points="285,348 295,353 285,358" fill="#94a3b8"/>
  <rect x="300" y="337" width="75" height="24" rx="4" fill="#fecaca" stroke="#ef4444" stroke-width="1"/>
  <text x="337" y="353" text-anchor="middle" font-family="system-ui" font-size="10" fill="#991b1b">Discard</text>
  <polygon points="380,348 390,353 380,358" fill="#94a3b8"/>
  <rect x="395" y="337" width="90" height="24" rx="4" fill="#fef9c3" stroke="#eab308" stroke-width="1"/>
  <text x="440" y="353" text-anchor="middle" font-family="system-ui" font-size="10" fill="#854d0e">Read chunk</text>
  <polygon points="490,348 500,353 490,358" fill="#94a3b8"/>
  <text x="520" y="353" font-family="system-ui" font-size="14" fill="#64748b">...</text>

  <text x="40" y="383" font-family="system-ui" font-size="12" fill="#64748b">Memory:</text>
  <rect x="120" y="371" width="60" height="16" rx="3" fill="#22c55e"/>
  <rect x="180" y="371" width="400" height="16" rx="3" fill="#e2e8f0"/>
  <text x="600" y="383" font-family="system-ui" font-size="11" fill="#166534" font-weight="600">fixed ~10 MB</text>

  <!-- Load All In Memory -->
  <text x="40" y="430" font-family="system-ui" font-size="15" font-weight="bold" fill="#0f172a">Load All In Memory</text>
  <line x1="40" y1="437" x2="760" y2="437" stroke="#e2e8f0" stroke-width="1"/>

  <text x="40" y="463" font-family="system-ui" font-size="12" fill="#64748b">Disk</text>
  <polygon points="75,458 85,463 75,468" fill="#94a3b8"/>
  <rect x="90" y="447" width="350" height="24" rx="4" fill="#fecaca" stroke="#ef4444" stroke-width="1"/>
  <text x="265" y="463" text-anchor="middle" font-family="system-ui" font-size="10" fill="#991b1b">Read ALL into memory</text>
  <polygon points="445,458 455,463 445,468" fill="#94a3b8"/>
  <rect x="460" y="447" width="120" height="24" rx="4" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1"/>
  <text x="520" y="463" text-anchor="middle" font-family="system-ui" font-size="10" fill="#6b21a8">Process all</text>

  <text x="40" y="495" font-family="system-ui" font-size="12" fill="#64748b">Memory:</text>
  <rect x="120" y="483" width="460" height="16" rx="3" fill="#ef4444"/>
  <text x="600" y="495" font-family="system-ui" font-size="11" fill="#dc2626" font-weight="600">12 GB!</text>

  <!-- Summary -->
  <rect x="40" y="525" width="720" height="40" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="400" y="550" text-anchor="middle" font-family="system-ui" font-size="13" fill="#475569">Parallelism = faster CPU work | Streaming = constant memory | Async = efficient I/O</text>
</svg>
