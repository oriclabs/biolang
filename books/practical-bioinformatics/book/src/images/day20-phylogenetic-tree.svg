<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" rx="12" fill="url(#bg)"/>
  <text x="400" y="40" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#0f172a">BRCA1 Species Phylogeny</text>

  <!-- Tree structure -->
  <!-- Root horizontal line -->
  <line x1="100" y1="210" x2="200" y2="210" stroke="#94a3b8" stroke-width="2.5"/>

  <!-- Upper clade (mammals) -->
  <line x1="200" y1="210" x2="200" y2="130" stroke="#94a3b8" stroke-width="2.5"/>
  <line x1="200" y1="130" x2="320" y2="130" stroke="#94a3b8" stroke-width="2.5"/>
  <!-- Human branch -->
  <line x1="320" y1="130" x2="320" y2="90" stroke="#94a3b8" stroke-width="2.5"/>
  <line x1="320" y1="90" x2="420" y2="90" stroke="#3b82f6" stroke-width="2.5"/>
  <!-- Mouse branch -->
  <line x1="320" y1="130" x2="320" y2="170" stroke="#94a3b8" stroke-width="2.5"/>
  <line x1="320" y1="170" x2="470" y2="170" stroke="#3b82f6" stroke-width="2.5"/>

  <!-- Lower clade (non-mammals) -->
  <line x1="200" y1="210" x2="200" y2="290" stroke="#94a3b8" stroke-width="2.5"/>
  <line x1="200" y1="290" x2="320" y2="290" stroke="#94a3b8" stroke-width="2.5"/>
  <!-- Chicken branch -->
  <line x1="320" y1="290" x2="320" y2="250" stroke="#94a3b8" stroke-width="2.5"/>
  <line x1="320" y1="250" x2="520" y2="250" stroke="#22c55e" stroke-width="2.5"/>
  <!-- Zebrafish branch -->
  <line x1="320" y1="290" x2="320" y2="330" stroke="#94a3b8" stroke-width="2.5"/>
  <line x1="320" y1="330" x2="570" y2="330" stroke="#22c55e" stroke-width="2.5"/>

  <!-- Species labels with nodes -->
  <circle cx="420" cy="90" r="5" fill="#3b82f6"/>
  <rect x="435" y="74" width="160" height="32" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="515" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="600" fill="#1e40af">Human (0.1)</text>

  <circle cx="470" cy="170" r="5" fill="#3b82f6"/>
  <rect x="485" y="154" width="160" height="32" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="565" y="175" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="600" fill="#1e40af">Mouse (0.25)</text>

  <circle cx="520" cy="250" r="5" fill="#22c55e"/>
  <rect x="535" y="234" width="175" height="32" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="622" y="255" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="600" fill="#166534">Chicken (0.35)</text>

  <circle cx="570" cy="330" r="5" fill="#22c55e"/>
  <rect x="585" y="314" width="185" height="32" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="677" y="335" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="600" fill="#166534">Zebrafish (0.45)</text>

  <!-- Clade labels -->
  <text x="160" y="118" text-anchor="middle" font-family="system-ui" font-size="11" fill="#64748b" font-style="italic">Mammals</text>
  <text x="160" y="308" text-anchor="middle" font-family="system-ui" font-size="11" fill="#64748b" font-style="italic">Outgroup</text>

  <!-- Branch length scale -->
  <line x1="100" y1="375" x2="300" y2="375" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="100" y1="370" x2="100" y2="380" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="300" y1="370" x2="300" y2="380" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="200" y="392" text-anchor="middle" font-family="system-ui" font-size="11" fill="#64748b">0.2 substitutions/site</text>
</svg>
