<svg viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="800" height="200" rx="12" fill="url(#bg)"/>
  <text x="400" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#0f172a">Lazy Stream Pipeline</text>
  <text x="400" y="55" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#64748b">Green = lazy (no data moves). Blue = terminal (triggers data flow).</text>

  <!-- File on disk -->
  <rect x="30" y="90" width="120" height="50" rx="8" fill="#fed7aa" stroke="#f97316" stroke-width="1.5"/>
  <text x="90" y="120" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#9a3412">File on disk</text>

  <line x1="150" y1="115" x2="190" y2="115" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="170" y="108" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748b">open</text>

  <!-- Stream -->
  <rect x="195" y="90" width="110" height="50" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="250" y="120" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#166534">Stream</text>

  <line x1="305" y1="115" x2="345" y2="115" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="325" y="108" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748b">filter()</text>

  <!-- Stream -->
  <rect x="350" y="90" width="110" height="50" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="405" y="120" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#166534">Stream</text>

  <line x1="460" y1="115" x2="500" y2="115" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="480" y="108" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748b">map()</text>

  <!-- Stream -->
  <rect x="505" y="90" width="110" height="50" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="560" y="120" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#166534">Stream</text>

  <line x1="615" y1="115" x2="655" y2="115" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="635" y="108" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748b">count()</text>

  <!-- Result -->
  <rect x="660" y="90" width="120" height="50" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="720" y="120" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#1e40af">Single number</text>
</svg>