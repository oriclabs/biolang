<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" style="background: #fff;">
  <defs>
    <marker id="arr2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#6b7280"/>
    </marker>
    <linearGradient id="rnaBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f0fdf4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="480" fill="url(#rnaBg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#0f172a">RNA — The Single-Stranded Messenger</text>
  <text x="400" y="56" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">A temporary copy of DNA, carried to the ribosome for translation</text>

  <!-- === LEFT: DNA (for comparison) === -->
  <rect x="30" y="75" width="230" height="340" rx="12" fill="#fff" stroke="#93c5fd" stroke-width="2"/>
  <text x="145" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" fill="#1e40af">DNA</text>
  <text x="145" y="116" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Double-stranded</text>

  <!-- DNA mini helix -->
  <line x1="85" y1="135" x2="85" y2="360" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
  <line x1="205" y1="135" x2="205" y2="360" stroke="#dc2626" stroke-width="3" stroke-linecap="round"/>

  <!-- DNA base pairs -->
  <rect x="93" y="140" width="28" height="18" rx="3" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="107" y="153" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#1e40af">A</text>
  <line x1="121" y1="149" x2="167" y2="149" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="167" y="140" width="28" height="18" rx="3" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
  <text x="181" y="153" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#991b1b">T</text>

  <rect x="93" y="170" width="28" height="18" rx="3" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="107" y="183" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#1e40af">T</text>
  <line x1="121" y1="179" x2="167" y2="179" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="167" y="170" width="28" height="18" rx="3" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
  <text x="181" y="183" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#991b1b">A</text>

  <rect x="93" y="200" width="28" height="18" rx="3" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="107" y="213" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#1e40af">G</text>
  <line x1="121" y1="209" x2="167" y2="209" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="167" y="200" width="28" height="18" rx="3" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
  <text x="181" y="213" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#991b1b">C</text>

  <rect x="93" y="230" width="28" height="18" rx="3" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="107" y="243" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#1e40af">C</text>
  <line x1="121" y1="239" x2="167" y2="239" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="167" y="230" width="28" height="18" rx="3" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
  <text x="181" y="243" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#991b1b">G</text>

  <rect x="93" y="260" width="28" height="18" rx="3" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="107" y="273" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#1e40af">A</text>
  <line x1="121" y1="269" x2="167" y2="269" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="167" y="260" width="28" height="18" rx="3" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
  <text x="181" y="273" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#991b1b">T</text>

  <rect x="93" y="290" width="28" height="18" rx="3" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="107" y="303" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#1e40af">T</text>
  <line x1="121" y1="299" x2="167" y2="299" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="167" y="290" width="28" height="18" rx="3" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
  <text x="181" y="303" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#991b1b">A</text>

  <rect x="93" y="320" width="28" height="18" rx="3" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="107" y="333" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#1e40af">G</text>
  <line x1="121" y1="329" x2="167" y2="329" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="167" y="320" width="28" height="18" rx="3" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
  <text x="181" y="333" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#991b1b">C</text>

  <!-- DNA labels -->
  <text x="85" y="385" text-anchor="middle" font-family="monospace" font-size="10" fill="#3b82f6">5'→3'</text>
  <text x="205" y="385" text-anchor="middle" font-family="monospace" font-size="10" fill="#dc2626">3'→5'</text>
  <text x="145" y="405" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Stable • Archives • Stays in nucleus</text>

  <!-- === ARROW: Transcription === -->
  <line x1="275" y1="250" x2="345" y2="250" stroke="#059669" stroke-width="3" marker-end="url(#arr2)"/>
  <text x="310" y="238" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#059669">Transcribe</text>
  <text x="310" y="272" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">T → U</text>

  <!-- === MIDDLE: RNA === -->
  <rect x="355" y="75" width="160" height="340" rx="12" fill="#fff" stroke="#6ee7b7" stroke-width="2"/>
  <text x="435" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" fill="#059669">mRNA</text>
  <text x="435" y="116" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Single-stranded</text>

  <!-- RNA single strand backbone -->
  <line x1="410" y1="135" x2="410" y2="360" stroke="#10b981" stroke-width="3" stroke-linecap="round"/>

  <!-- RNA bases (single strand — note U instead of T) -->
  <rect x="418" y="140" width="28" height="18" rx="3" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="432" y="153" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#065f46">A</text>

  <rect x="418" y="170" width="28" height="18" rx="3" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="432" y="183" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#854d0e">U</text>
  <text x="468" y="183" font-family="system-ui, sans-serif" font-size="9" fill="#dc2626" font-weight="bold">← U not T!</text>

  <rect x="418" y="200" width="28" height="18" rx="3" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="432" y="213" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#065f46">G</text>

  <rect x="418" y="230" width="28" height="18" rx="3" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="432" y="243" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#065f46">C</text>

  <rect x="418" y="260" width="28" height="18" rx="3" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="432" y="273" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#065f46">A</text>

  <rect x="418" y="290" width="28" height="18" rx="3" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="432" y="303" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#854d0e">U</text>

  <rect x="418" y="320" width="28" height="18" rx="3" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="432" y="333" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#065f46">G</text>

  <!-- RNA label -->
  <text x="410" y="385" text-anchor="middle" font-family="monospace" font-size="10" fill="#059669">5'→3'</text>
  <text x="435" y="405" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Temporary • Messenger • Exported</text>

  <!-- === RIGHT: Comparison table === -->
  <rect x="540" y="75" width="240" height="340" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="660" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#0f172a">DNA vs RNA</text>

  <!-- Table header -->
  <line x1="555" y1="112" x2="765" y2="112" stroke="#e2e8f0" stroke-width="1"/>
  <text x="610" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Feature</text>
  <text x="685" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#1e40af">DNA</text>
  <text x="745" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#059669">RNA</text>
  <line x1="555" y1="138" x2="765" y2="138" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Rows -->
  <text x="610" y="158" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">Strands</text>
  <text x="685" y="158" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">2</text>
  <text x="745" y="158" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">1</text>

  <text x="610" y="182" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">Sugar</text>
  <text x="685" y="182" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">Deoxy-</text>
  <text x="745" y="182" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">Ribo-</text>

  <text x="610" y="206" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">Bases</text>
  <text x="685" y="206" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#1e40af">ATCG</text>
  <text x="745" y="206" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#059669">AUCG</text>

  <text x="610" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">Lifetime</text>
  <text x="685" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">Years</text>
  <text x="745" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">Minutes</text>

  <text x="610" y="254" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">Location</text>
  <text x="685" y="254" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">Nucleus</text>
  <text x="745" y="254" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">Cytoplasm</text>

  <text x="610" y="278" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">Copies</text>
  <text x="685" y="278" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">1 per cell</text>
  <text x="745" y="278" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">Many</text>

  <text x="610" y="302" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">Role</text>
  <text x="685" y="302" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">Storage</text>
  <text x="745" y="302" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">Transport</text>

  <text x="610" y="326" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">Analogy</text>
  <text x="685" y="326" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">Hard drive</text>
  <text x="745" y="326" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">RAM</text>

  <!-- Key difference callout -->
  <rect x="540" y="420" width="240" height="45" rx="8" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="660" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#854d0e">Key difference: T → U</text>
  <text x="660" y="456" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#854d0e">RNA uses Uracil where DNA uses Thymine</text>
</svg>
