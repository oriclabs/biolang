<svg viewBox="0 0 800 580" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="800" height="580" rx="12" fill="url(#bg)"/>
  <text x="400" y="35" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#0f172a">Reproducibility Lifecycle</text>

  <!-- Row 1: Write config -> Write pipeline -> Run -->
  <rect x="40" y="60" width="150" height="40" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="115" y="85" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#1e40af">Write config.json</text>

  <line x1="190" y1="80" x2="225" y2="80" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="230" y="60" width="150" height="40" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="305" y="85" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#1e40af">Write pipeline.bl</text>

  <line x1="380" y1="80" x2="415" y2="80" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="420" y="60" width="170" height="40" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="505" y="85" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#166534">Run: bl run pipeline.bl</text>

  <!-- Arrow down to validate -->
  <line x1="505" y1="100" x2="505" y2="125" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Validate config (diamond) -->
  <rect x="435" y="130" width="140" height="36" rx="18" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="505" y="153" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#854d0e">Validate config</text>

  <!-- Invalid -> Fix config -> loop back -->
  <line x1="575" y1="148" x2="650" y2="148" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="610" y="140" font-family="system-ui" font-size="10" fill="#ef4444">Invalid</text>
  <rect x="650" y="130" width="110" height="36" rx="8" fill="#fecaca" stroke="#ef4444" stroke-width="1.5"/>
  <text x="705" y="153" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#991b1b">Fix config</text>
  <line x1="705" y1="130" x2="705" y2="80" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4"/>
  <line x1="705" y1="80" x2="590" y2="80" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#arrow)"/>

  <!-- Valid -> Row 2: Processing steps -->
  <line x1="505" y1="166" x2="505" y2="195" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="520" y="183" font-family="system-ui" font-size="10" fill="#22c55e">Valid</text>

  <!-- Row 2 -->
  <rect x="50" y="200" width="140" height="36" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="120" y="223" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#166534">Checksum inputs</text>

  <line x1="190" y1="218" x2="215" y2="218" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="220" y="200" width="140" height="36" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="290" y="223" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#166534">Process samples</text>

  <line x1="360" y1="218" x2="385" y2="218" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="390" y="200" width="120" height="36" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="450" y="223" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#166534">Write results</text>

  <line x1="510" y1="218" x2="535" y2="218" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="540" y="200" width="140" height="36" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="610" y="223" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#166534">Checksum outputs</text>

  <!-- Arrow to provenance -->
  <line x1="505" y1="200" x2="505" y2="218" stroke="none"/>
  <line x1="610" y1="236" x2="610" y2="265" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Row 3: Save and share -->
  <rect x="530" y="270" width="160" height="36" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="610" y="293" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#6b21a8">Save provenance.json</text>

  <line x1="530" y1="288" x2="470" y2="288" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="310" y="270" width="155" height="36" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="387" y="293" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#1e40af">Commit to VCS</text>

  <line x1="310" y1="288" x2="260" y2="288" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="100" y="270" width="155" height="36" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="177" y="293" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#1e40af">Share with collaborator</text>

  <!-- Arrow down -->
  <line x1="177" y1="306" x2="177" y2="340" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Row 4: Collaborator side -->
  <rect x="75" y="345" width="200" height="36" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="175" y="368" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#166534">Collaborator runs pipeline</text>

  <line x1="275" y1="363" x2="330" y2="363" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Compare provenance -->
  <rect x="335" y="345" width="180" height="36" rx="18" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="425" y="368" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#854d0e">Compare provenance</text>

  <!-- Match -->
  <line x1="425" y1="381" x2="300" y2="425" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="340" y="402" font-family="system-ui" font-size="10" fill="#22c55e" font-weight="bold">Match</text>
  <rect x="200" y="420" width="180" height="40" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="290" y="445" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#166534">Results reproduced!</text>

  <!-- Differ -->
  <line x1="515" y1="363" x2="570" y2="363" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="540" y="355" font-family="system-ui" font-size="10" fill="#ef4444" font-weight="bold">Differ</text>
  <rect x="575" y="345" width="180" height="36" rx="8" fill="#fecaca" stroke="#ef4444" stroke-width="1.5"/>
  <text x="665" y="368" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#991b1b">Identify what changed</text>

  <line x1="665" y1="381" x2="665" y2="405" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="595" y="410" width="140" height="36" rx="8" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="665" y="433" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#854d0e">Fix and re-run</text>

  <!-- Loop back to compare -->
  <line x1="595" y1="428" x2="520" y2="395" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#arrow)"/>

  <!-- Summary -->
  <rect x="100" y="490" width="600" height="40" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="400" y="515" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="600" fill="#475569">Configure -- Run -- Log -- Share -- Verify</text>

  <!-- Subtitle -->
  <text x="400" y="555" text-anchor="middle" font-family="system-ui" font-size="12" fill="#94a3b8">Every run produces a provenance file. If results differ, provenance tells you why.</text>
</svg>
