<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
  </defs>
  <rect width="800" height="720" rx="12" fill="url(#bg)"/>
  <text x="400" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#0f172a">Classification Decision Tree</text>
  <text x="400" y="62" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#64748b">Scoring rubric for simplified ACMG-inspired variant classification</text>

  <!-- Column headers -->
  <rect x="40" y="85" width="340" height="30" rx="6" fill="#e2e8f0"/>
  <text x="210" y="105" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#334155">Evidence Dimension</text>
  <rect x="420" y="85" width="340" height="30" rx="6" fill="#e2e8f0"/>
  <text x="590" y="105" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#334155">Points</text>

  <!-- 1. ClinVar -->
  <rect x="40" y="125" width="340" height="130" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="60" y="148" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#5b21b6">1. ClinVar Status</text>
  <text x="60" y="168" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#5b21b6">pathogenic</text>
  <text x="60" y="186" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#5b21b6">likely_pathogenic</text>
  <text x="60" y="204" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#5b21b6">uncertain</text>
  <text x="60" y="222" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#5b21b6">likely_benign</text>
  <text x="60" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#5b21b6">benign</text>

  <rect x="420" y="125" width="340" height="130" rx="8" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="440" y="168" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#166534">+3</text>
  <text x="440" y="186" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#166534">+2</text>
  <text x="440" y="204" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748b">0</text>
  <text x="440" y="222" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#991b1b">-1</text>
  <text x="440" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#991b1b">-2</text>

  <!-- 2. Population Frequency -->
  <rect x="40" y="265" width="340" height="110" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="60" y="288" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#166534">2. Population Frequency (AF)</text>
  <text x="60" y="308" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#166534">absent (0.0)</text>
  <text x="60" y="326" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#166534">rare (&lt; 0.001)</text>
  <text x="60" y="344" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#166534">low (&lt; 0.01)</text>
  <text x="60" y="362" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748b">common (>= 0.01) -- already filtered</text>

  <rect x="420" y="265" width="340" height="110" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="440" y="308" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#166534">+1</text>
  <text x="440" y="326" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748b">0</text>
  <text x="440" y="344" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#991b1b">-1</text>

  <!-- 3. Predicted Impact -->
  <rect x="40" y="385" width="340" height="130" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="60" y="408" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#1e40af">3. Predicted Impact</text>
  <text x="60" y="428" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#1e40af">frameshift / nonsense / splice</text>
  <text x="60" y="446" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#1e40af">missense</text>
  <text x="60" y="464" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#1e40af">synonymous</text>

  <rect x="420" y="385" width="340" height="130" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="440" y="428" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#166534">+2</text>
  <text x="440" y="446" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#166534">+1</text>
  <text x="440" y="464" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#991b1b">-1</text>

  <!-- 4. Gene-Disease -->
  <rect x="40" y="525" width="340" height="65" rx="8" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="60" y="548" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#854d0e">4. Gene-Disease Strength</text>
  <text x="60" y="568" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#854d0e">definitive / other</text>

  <rect x="420" y="525" width="340" height="65" rx="8" fill="#fefce8" stroke="#fde047" stroke-width="1"/>
  <text x="440" y="555" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#854d0e">definitive: <tspan font-weight="bold" fill="#166534">+1</tspan> / other: <tspan fill="#64748b">0</tspan></text>

  <!-- Score thresholds -->
  <rect x="100" y="610" width="600" height="85" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="400" y="632" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#0f172a">Total Score Classification</text>
  <text x="140" y="658" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#0f172a">
    <tspan font-weight="bold" fill="#991b1b">>= 4</tspan> Pathogenic
    <tspan dx="20" font-weight="bold" fill="#9a3412">3</tspan> Likely Pathogenic
    <tspan dx="20" font-weight="bold" fill="#854d0e">1-2</tspan> VUS
  </text>
  <text x="140" y="678" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#0f172a">
    <tspan font-weight="bold" fill="#1e40af">0</tspan> Likely Benign
    <tspan dx="40" font-weight="bold" fill="#166534">&lt; 0</tspan> Benign
  </text>
</svg>