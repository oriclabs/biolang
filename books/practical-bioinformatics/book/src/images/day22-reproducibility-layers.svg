<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
  </defs>
  <rect width="800" height="480" rx="12" fill="url(#bg)"/>
  <text x="400" y="40" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#0f172a">Reproducibility Layers</text>

  <!-- Layer 4: Provenance (top) -->
  <rect x="120" y="70" width="560" height="80" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2"/>
  <text x="150" y="95" font-family="system-ui" font-size="16" font-weight="bold" fill="#6b21a8">4. PROVENANCE</text>
  <text x="150" y="115" font-family="system-ui" font-size="13" fill="#7c3aed">Who ran it, when, what happened</text>
  <text x="150" y="135" font-family="system-ui" font-size="12" fill="#8b5cf6" font-style="italic">(logs, timestamps, checksums)</text>

  <!-- Layer 3: Parameters -->
  <rect x="120" y="160" width="560" height="80" rx="8" fill="#fef9c3" stroke="#eab308" stroke-width="2"/>
  <text x="150" y="185" font-family="system-ui" font-size="16" font-weight="bold" fill="#854d0e">3. PARAMETERS</text>
  <text x="150" y="205" font-family="system-ui" font-size="13" fill="#a16207">Configuration files, thresholds</text>
  <text x="150" y="225" font-family="system-ui" font-size="12" fill="#ca8a04" font-style="italic">(reference versions, filter settings)</text>

  <!-- Layer 2: Code -->
  <rect x="120" y="250" width="560" height="80" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="150" y="275" font-family="system-ui" font-size="16" font-weight="bold" fill="#166534">2. CODE</text>
  <text x="150" y="295" font-family="system-ui" font-size="13" fill="#15803d">Pipeline scripts, functions, modules</text>
  <text x="150" y="315" font-family="system-ui" font-size="12" fill="#22c55e" font-style="italic">(version-controlled, tested)</text>

  <!-- Layer 1: Data (bottom) -->
  <rect x="120" y="340" width="560" height="80" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="150" y="365" font-family="system-ui" font-size="16" font-weight="bold" fill="#1e40af">1. DATA</text>
  <text x="150" y="385" font-family="system-ui" font-size="13" fill="#2563eb">Raw inputs with checksums</text>
  <text x="150" y="405" font-family="system-ui" font-size="12" fill="#3b82f6" font-style="italic">(FASTQ, reference genomes, databases)</text>

  <!-- Arrow on left indicating stack -->
  <line x1="90" y1="390" x2="90" y2="100" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="86,100 90,85 94,100" fill="#94a3b8"/>
  <text x="75" y="250" text-anchor="middle" font-family="system-ui" font-size="11" fill="#94a3b8" transform="rotate(-90, 75, 250)">Builds on</text>

  <!-- Footer note -->
  <rect x="120" y="435" width="560" height="32" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="400" y="456" text-anchor="middle" font-family="system-ui" font-size="12" fill="#64748b">If any layer changes, results may differ. All four layers must be captured.</text>
</svg>
