<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 180">
  <defs>
    <linearGradient id="bg16" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
    <marker id="arr16" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="800" height="180" rx="12" fill="url(#bg16)"/>
  <text x="400" y="35" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="bold" fill="#0f172a">Gene Set Enrichment Workflow</text>

  <!-- Gene List -->
  <rect x="30" y="60" width="130" height="50" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="95" y="82" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#1e40af">Gene List</text>
  <text x="95" y="98" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#3b82f6">500 DE genes</text>

  <!-- Plus sign -->
  <text x="178" y="90" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#94a3b8">+</text>

  <!-- Gene Set DB -->
  <rect x="200" y="60" width="130" height="50" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="265" y="82" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#5b21b6">Gene Set DB</text>
  <text x="265" y="98" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#8b5cf6">GO, KEGG, etc.</text>

  <!-- Arrow -->
  <line x1="330" y1="85" x2="370" y2="85" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr16)"/>

  <!-- Statistical Test -->
  <rect x="375" y="60" width="130" height="50" rx="8" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="440" y="82" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#854d0e">Statistical Test</text>
  <text x="440" y="98" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#eab308">Fisher / GSEA</text>

  <!-- Arrow -->
  <line x1="505" y1="85" x2="545" y2="85" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr16)"/>

  <!-- Enriched Terms -->
  <rect x="550" y="60" width="130" height="50" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="615" y="82" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#166534">Enriched Terms</text>
  <text x="615" y="98" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#22c55e">p &lt; 0.05</text>

  <!-- Arrow -->
  <line x1="615" y1="110" x2="615" y2="130" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr16)"/>

  <!-- Interpretation -->
  <rect x="520" y="133" width="190" height="40" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="615" y="153" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#166534">Biological</text>
  <text x="615" y="167" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#166534">Interpretation</text>
</svg>