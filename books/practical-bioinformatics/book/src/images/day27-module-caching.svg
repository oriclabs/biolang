<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="800" height="280" rx="12" fill="url(#bg)"/>
  <text x="400" y="36" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#0f172a">Module Import &amp; Caching</text>

  <!-- main.bl -->
  <rect x="280" y="60" width="180" height="45" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="370" y="87" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="600" fill="#1e40af">main.bl</text>

  <!-- Arrow to seq_utils -->
  <line x1="320" y1="105" x2="170" y2="155" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="220" y="125" font-family="system-ui" font-size="10" fill="#3b82f6">import</text>

  <!-- Arrow to qc.bl -->
  <line x1="420" y1="105" x2="570" y2="155" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="520" y="125" font-family="system-ui" font-size="10" fill="#22c55e">import</text>

  <!-- seq_utils.bl -->
  <rect x="70" y="160" width="200" height="45" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="170" y="187" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="600" fill="#166534">lib/seq_utils.bl</text>

  <!-- qc.bl -->
  <rect x="480" y="160" width="200" height="45" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="580" y="187" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="600" fill="#5b21b6">lib/qc.bl</text>

  <!-- Arrow from qc.bl to seq_utils (also imports it) -->
  <line x1="480" y1="182" x2="275" y2="182" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="5,3"/>
  <text x="378" y="175" font-family="system-ui" font-size="10" fill="#8b5cf6">import (hits cache)</text>

  <!-- Module Cache -->
  <rect x="270" y="230" width="200" height="40" rx="20" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="370" y="255" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="600" fill="#854d0e">Module Cache</text>

  <!-- Arrows to cache -->
  <line x1="170" y1="205" x2="300" y2="235" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="210" y="227" font-family="system-ui" font-size="9" fill="#64748b">cached</text>

  <line x1="580" y1="205" x2="440" y2="235" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="530" y="227" font-family="system-ui" font-size="9" fill="#64748b">reuses cached</text>

  <!-- Note -->
  <text x="400" y="45" text-anchor="middle" font-family="system-ui" font-size="12" fill="#64748b">Each module loads once, even if imported from multiple files</text>
</svg>