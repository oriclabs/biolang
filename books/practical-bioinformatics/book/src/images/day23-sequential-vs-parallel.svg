<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="800" height="340" rx="12" fill="url(#bg)"/>
  <text x="400" y="36" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#0f172a">Sequential vs Parallel Processing</text>

  <!-- Sequential section -->
  <text x="200" y="72" text-anchor="middle" font-family="system-ui" font-size="15" font-weight="600" fill="#475569">Sequential (map)</text>
  <rect x="40" y="85" width="320" height="100" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>

  <rect x="55" y="105" width="65" height="32" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="87" y="125" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#1e40af">S1</text>

  <line x1="120" y1="121" x2="130" y2="121" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="138" y="105" width="65" height="32" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="170" y="125" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#1e40af">S2</text>

  <line x1="203" y1="121" x2="213" y2="121" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="221" y="105" width="65" height="32" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="253" y="125" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#1e40af">S3</text>

  <line x1="286" y1="121" x2="296" y2="121" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <text x="315" y="125" font-family="system-ui" font-size="14" fill="#94a3b8">...</text>

  <text x="200" y="168" text-anchor="middle" font-family="system-ui" font-size="12" fill="#dc2626" font-weight="600">N x T seconds total</text>

  <!-- Arrow to results -->
  <line x1="360" y1="135" x2="370" y2="135" stroke="#94a3b8" stroke-width="1.5"/>

  <rect x="372" y="115" width="70" height="36" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="407" y="138" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#166534">Results</text>

  <!-- Parallel section -->
  <text x="600" y="72" text-anchor="middle" font-family="system-ui" font-size="15" font-weight="600" fill="#475569">Parallel (par_map)</text>
  <rect x="470" y="85" width="280" height="180" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>

  <rect x="490" y="100" width="100" height="32" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="540" y="120" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#166534">Sample 1</text>

  <rect x="490" y="140" width="100" height="32" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="540" y="160" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#166534">Sample 2</text>

  <rect x="490" y="180" width="100" height="32" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="540" y="200" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#166534">Sample 3</text>

  <rect x="490" y="220" width="100" height="32" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="540" y="240" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#166534">Sample N</text>

  <!-- Arrows to results -->
  <line x1="590" y1="116" x2="650" y2="175" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="590" y1="156" x2="650" y2="175" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="590" y1="196" x2="650" y2="185" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="590" y1="236" x2="650" y2="195" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="660" y="165" width="70" height="40" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="695" y="190" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#166534">Results</text>

  <!-- Time comparison -->
  <rect x="100" y="290" width="250" height="36" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="225" y="313" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="600" fill="#dc2626">N x T seconds</text>

  <rect x="470" y="290" width="250" height="36" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="595" y="313" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="600" fill="#166534">~ T seconds</text>
</svg>