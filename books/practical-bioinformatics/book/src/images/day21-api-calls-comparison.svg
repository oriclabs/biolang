<svg viewBox="0 0 800 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
  </defs>
  <rect width="800" height="340" rx="12" fill="url(#bg)"/>
  <text x="400" y="35" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#0f172a">Sequential vs Concurrent API Calls</text>

  <!-- Sequential -->
  <text x="40" y="80" font-family="system-ui" font-size="15" font-weight="bold" fill="#0f172a">Sequential API Calls</text>
  <line x1="40" y1="87" x2="760" y2="87" stroke="#e2e8f0" stroke-width="1"/>

  <text x="40" y="115" font-family="system-ui" font-size="12" fill="#64748b">Time:</text>
  <rect x="100" y="99" width="180" height="28" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="190" y="117" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#1e40af">Call 1</text>
  <rect x="284" y="99" width="180" height="28" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="374" y="117" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#166534">Call 2</text>
  <rect x="468" y="99" width="180" height="28" rx="8" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="558" y="117" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#854d0e">Call 3</text>

  <!-- Time markers -->
  <text x="100" y="145" font-family="system-ui" font-size="11" fill="#94a3b8">0s</text>
  <text x="280" y="145" font-family="system-ui" font-size="11" fill="#94a3b8">1s</text>
  <text x="464" y="145" font-family="system-ui" font-size="11" fill="#94a3b8">2s</text>
  <text x="648" y="145" font-family="system-ui" font-size="11" fill="#dc2626" font-weight="bold">3s</text>
  <line x1="100" y1="132" x2="660" y2="132" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4"/>

  <!-- Concurrent -->
  <text x="40" y="195" font-family="system-ui" font-size="15" font-weight="bold" fill="#0f172a">Concurrent with await_all</text>
  <line x1="40" y1="202" x2="760" y2="202" stroke="#e2e8f0" stroke-width="1"/>

  <text x="40" y="230" font-family="system-ui" font-size="12" fill="#64748b">Time:</text>
  <rect x="100" y="214" width="180" height="28" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="190" y="232" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#1e40af">Call 1</text>
  <rect x="100" y="246" width="180" height="28" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="190" y="264" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#166534">Call 2</text>
  <rect x="100" y="278" width="180" height="28" rx="8" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="190" y="296" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#854d0e">Call 3</text>

  <!-- Time markers -->
  <text x="100" y="322" font-family="system-ui" font-size="11" fill="#94a3b8">0s</text>
  <text x="280" y="322" font-family="system-ui" font-size="11" fill="#22c55e" font-weight="bold">1s</text>
  <line x1="100" y1="310" x2="290" y2="310" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4"/>

  <!-- All done marker -->
  <line x1="284" y1="210" x2="284" y2="310" stroke="#22c55e" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="300" y="265" font-family="system-ui" font-size="12" fill="#22c55e" font-weight="bold">All done!</text>

  <!-- 3x label -->
  <rect x="660" y="240" width="100" height="36" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="710" y="263" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#166534">3x faster</text>
</svg>
