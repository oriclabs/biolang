<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="800" height="420" rx="12" fill="url(#bg)"/>
  <text x="400" y="38" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#0f172a">Bioinformatics Database Landscape</text>

  <!-- Gene list box -->
  <rect x="250" y="60" width="300" height="42" rx="8" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="400" y="86" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="600" fill="#854d0e">YOUR GENE LIST (50 genes)</text>

  <!-- Three arrows down -->
  <line x1="200" y1="102" x2="140" y2="140" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="102" x2="400" y2="140" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="600" y1="102" x2="660" y2="140" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Gene Info column -->
  <rect x="40" y="145" width="200" height="120" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="140" y="170" text-anchor="middle" font-family="system-ui" font-size="15" font-weight="700" fill="#1e40af">Gene Info</text>
  <text x="140" y="194" text-anchor="middle" font-family="system-ui" font-size="12" fill="#1e40af">NCBI Gene</text>
  <text x="140" y="214" text-anchor="middle" font-family="system-ui" font-size="12" fill="#1e40af">Ensembl</text>
  <text x="140" y="234" text-anchor="middle" font-family="system-ui" font-size="12" fill="#1e40af">NCBI Datasets</text>

  <!-- Protein Info column -->
  <rect x="300" y="145" width="200" height="120" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="400" y="170" text-anchor="middle" font-family="system-ui" font-size="15" font-weight="700" fill="#166534">Protein Info</text>
  <text x="400" y="194" text-anchor="middle" font-family="system-ui" font-size="12" fill="#166534">UniProt</text>
  <text x="400" y="214" text-anchor="middle" font-family="system-ui" font-size="12" fill="#166534">PDB</text>
  <text x="400" y="234" text-anchor="middle" font-family="system-ui" font-size="12" fill="#166534">STRING</text>

  <!-- Pathways column -->
  <rect x="560" y="145" width="200" height="120" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="660" y="170" text-anchor="middle" font-family="system-ui" font-size="15" font-weight="700" fill="#5b21b6">Pathways</text>
  <text x="660" y="194" text-anchor="middle" font-family="system-ui" font-size="12" fill="#5b21b6">KEGG</text>
  <text x="660" y="214" text-anchor="middle" font-family="system-ui" font-size="12" fill="#5b21b6">Reactome</text>
  <text x="660" y="234" text-anchor="middle" font-family="system-ui" font-size="12" fill="#5b21b6">Gene Ontology</text>

  <!-- Arrows down to output descriptions -->
  <line x1="140" y1="265" x2="140" y2="300" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="265" x2="400" y2="300" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="660" y1="265" x2="660" y2="300" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Output descriptions -->
  <rect x="30" y="305" width="220" height="95" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="140" y="326" text-anchor="middle" font-family="system-ui" font-size="11" fill="#475569">Gene summaries</text>
  <text x="140" y="344" text-anchor="middle" font-family="system-ui" font-size="11" fill="#475569">Genomic coordinates</text>
  <text x="140" y="362" text-anchor="middle" font-family="system-ui" font-size="11" fill="#475569">Variant effects</text>
  <text x="140" y="380" text-anchor="middle" font-family="system-ui" font-size="11" fill="#475569">Literature links</text>

  <rect x="290" y="305" width="220" height="95" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="400" y="326" text-anchor="middle" font-family="system-ui" font-size="11" fill="#475569">Protein domains</text>
  <text x="400" y="344" text-anchor="middle" font-family="system-ui" font-size="11" fill="#475569">3D structures</text>
  <text x="400" y="362" text-anchor="middle" font-family="system-ui" font-size="11" fill="#475569">Interaction networks</text>
  <text x="400" y="380" text-anchor="middle" font-family="system-ui" font-size="11" fill="#475569">Post-translational mods</text>

  <rect x="550" y="305" width="220" height="95" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="660" y="326" text-anchor="middle" font-family="system-ui" font-size="11" fill="#475569">Pathway membership</text>
  <text x="660" y="344" text-anchor="middle" font-family="system-ui" font-size="11" fill="#475569">Biological processes</text>
  <text x="660" y="362" text-anchor="middle" font-family="system-ui" font-size="11" fill="#475569">Molecular functions</text>
  <text x="660" y="380" text-anchor="middle" font-family="system-ui" font-size="11" fill="#475569">Cellular components</text>
</svg>