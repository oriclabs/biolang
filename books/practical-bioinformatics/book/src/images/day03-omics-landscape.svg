<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" style="background: #fff;">
  <defs>
    <linearGradient id="omBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <marker id="omArr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="800" height="420" fill="url(#omBg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#0f172a">The -omics Landscape</text>
  <text x="400" y="52" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#64748b">Modern biology organized into layers of data and analysis</text>

  <!-- Genomics (blue, top center) -->
  <rect x="295" y="75" width="210" height="52" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="400" y="97" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#1e40af">Genomics</text>
  <text x="400" y="117" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#1e40af">DNA sequence &amp; structure</text>

  <!-- Transcriptomics (green, middle left) -->
  <rect x="85" y="175" width="210" height="52" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="190" y="197" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#166534">Transcriptomics</text>
  <text x="190" y="217" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#166534">RNA expression levels</text>

  <!-- Proteomics (amber, middle center) -->
  <rect x="85" y="275" width="210" height="52" rx="8" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="190" y="297" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#854d0e">Proteomics</text>
  <text x="190" y="317" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#854d0e">Protein abundance &amp; modification</text>

  <!-- Metabolomics (pink, bottom center) -->
  <rect x="85" y="370" width="210" height="42" rx="8" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5"/>
  <text x="190" y="396" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#9d174d">Metabolomics</text>

  <!-- Epigenomics (indigo, right of genomics) -->
  <rect x="555" y="175" width="210" height="52" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="660" y="197" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#3730a3">Epigenomics</text>
  <text x="660" y="217" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#3730a3">Chemical marks on DNA</text>

  <!-- Variant Analysis (red, right middle) -->
  <rect x="555" y="275" width="210" height="52" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="660" y="297" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#991b1b">Variant Analysis</text>
  <text x="660" y="317" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#991b1b">Mutations, SNPs, structural</text>

  <!-- Single-cell -omics (purple, bottom right) -->
  <rect x="340" y="370" width="210" height="42" rx="8" fill="#f3e8ff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="445" y="396" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#6b21a8">Single-cell -omics</text>

  <!-- Arrows: Genomics -> Transcriptomics -->
  <line x1="340" y1="127" x2="230" y2="175" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#omArr)"/>
  <!-- Genomics -> Epigenomics -->
  <line x1="460" y1="127" x2="620" y2="175" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#omArr)"/>
  <!-- Genomics -> Variant Analysis -->
  <line x1="505" y1="110" x2="660" y2="275" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#omArr)"/>
  <!-- Transcriptomics -> Proteomics -->
  <line x1="190" y1="227" x2="190" y2="275" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#omArr)"/>
  <!-- Proteomics -> Metabolomics -->
  <line x1="190" y1="327" x2="190" y2="370" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#omArr)"/>
  <!-- Transcriptomics -> Single-cell -->
  <line x1="250" y1="227" x2="410" y2="370" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#omArr)"/>
</svg>
