<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="800" height="480" rx="12" fill="url(#bg)"/>
  <text x="400" y="36" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#0f172a">LLM Prompting Decision Tree</text>

  <!-- Raw Question -->
  <rect x="300" y="55" width="200" height="42" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="400" y="81" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="600" fill="#1e40af">Raw Question</text>

  <line x1="400" y1="97" x2="400" y2="118" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Decision: Add context? -->
  <polygon points="400,120 460,150 400,180 340,150" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="400" y="148" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="600" fill="#854d0e">Add biological</text>
  <text x="400" y="160" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="600" fill="#854d0e">context?</text>

  <!-- No branch -->
  <line x1="340" y1="150" x2="200" y2="150" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="270" y="143" font-family="system-ui" font-size="10" fill="#64748b">No</text>
  <rect x="100" y="135" width="145" height="34" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="172" y="157" text-anchor="middle" font-family="system-ui" font-size="11" fill="#dc2626">Vague Response</text>

  <!-- Yes branch -->
  <line x1="400" y1="180" x2="400" y2="200" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="415" y="194" font-family="system-ui" font-size="10" fill="#64748b">Yes</text>

  <!-- Specify context -->
  <rect x="280" y="205" width="240" height="36" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="400" y="228" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#166534">Specify Organism, Tissue, Assay</text>

  <line x1="400" y1="241" x2="400" y2="262" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Decision: Provide data? -->
  <polygon points="400,264 460,294 400,324 340,294" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="400" y="296" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="600" fill="#854d0e">Provide data?</text>

  <!-- No branch -->
  <line x1="340" y1="294" x2="200" y2="294" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="270" y="287" font-family="system-ui" font-size="10" fill="#64748b">No</text>
  <rect x="70" y="278" width="170" height="34" rx="6" fill="#fef9c3" stroke="#eab308" stroke-width="1"/>
  <text x="155" y="300" text-anchor="middle" font-family="system-ui" font-size="11" fill="#854d0e">General Knowledge</text>

  <!-- Yes branch -->
  <line x1="400" y1="324" x2="400" y2="342" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="415" y="337" font-family="system-ui" font-size="10" fill="#64748b">Yes</text>

  <!-- Pass as context -->
  <rect x="280" y="347" width="240" height="36" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="400" y="370" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#1e40af">Pass as chat() context arg</text>

  <line x1="400" y1="383" x2="400" y2="400" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Decision: Constrain format? -->
  <polygon points="400,402 460,425 400,448 340,425" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="400" y="423" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="600" fill="#854d0e">Constrain</text>
  <text x="400" y="435" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="600" fill="#854d0e">format?</text>

  <!-- Yes: structured -->
  <line x1="460" y1="425" x2="590" y2="425" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="520" y="418" font-family="system-ui" font-size="10" fill="#64748b">Yes</text>
  <rect x="595" y="408" width="170" height="34" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="680" y="430" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#166534">Structured Response</text>

  <!-- No: free-form -->
  <line x1="340" y1="425" x2="200" y2="425" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="270" y="418" font-family="system-ui" font-size="10" fill="#64748b">No</text>
  <rect x="75" y="408" width="160" height="34" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="155" y="430" text-anchor="middle" font-family="system-ui" font-size="11" fill="#475569">Free-form Text</text>

  <!-- Verify box at bottom right -->
  <line x1="680" y1="442" x2="680" y2="462" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="680" y="476" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#dc2626">Verify against primary sources</text>
</svg>