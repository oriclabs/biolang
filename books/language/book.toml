[book]
title = "The BioLang Programming Language"
authors = ["Bioras"]
description = "A comprehensive guide to BioLang — the pipe-first bioinformatics programming language"
language = "en"
src = "src"

[build]
build-dir = "../../website/book"

[output.html]
default-theme = "light"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/oriclabs/biolang"
additional-css = ["theme/print.css"]
additional-js = ["theme/toolbar-buttons.js", "theme/book-runner.js"]

[output.pdf]
title = "The BioLang Programming Language"
authors = "Bioras"
output-file = "the-biolang-programming-language.pdf"
paper-width = 8.27
paper-height = 11.69
margin-top = 0.6
margin-bottom = 0.6
margin-left = 0.8
margin-right = 0.8
scale = 1.0
header-template = "<div style='font-size:8px; width:100%; text-align:center; color:#888; margin-top:4px;'>The BioLang Book</div>"
footer-template = "<div style='font-size:8px; width:100%; text-align:center; color:#888; margin-bottom:4px;'><span class='pageNumber'></span> / <span class='totalPages'></span></div>"
display-header-footer = true
prefer-css-page-size = false
print-background = true
landscape = false
trying-times = 3
