<!DOCTYPE html>
<html>
<head>
<title>BioKhoj Icon Generator</title>
<style>
  body { background: #1e293b; color: #e2e8f0; font-family: system-ui; padding: 20px; }
  canvas { border: 1px solid #334155; margin: 8px; }
  .row { display: flex; flex-wrap: wrap; gap: 10px; align-items: end; margin: 20px 0; }
  button { padding: 8px 16px; background: #F4C430; color: #000; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; }
  a { color: #F4C430; }
</style>
</head>
<body>
<h1>BioKhoj Icon Generator</h1>
<p>Click "Generate All" then right-click each canvas to "Save Image As" with the filename shown below it.</p>
<button onclick="generateAll()">Generate All</button>

<div class="row" id="icons"></div>

<h2>PWA Icons</h2>
<div class="row" id="pwa-icons"></div>

<script>
const SIZES = [16, 32, 48, 128];
const PWA_SIZES = [72, 96, 128, 144, 152, 192, 384, 512];

function drawIcon(canvas, size) {
  const ctx = canvas.getContext('2d');
  canvas.width = size;
  canvas.height = size;

  // Background: dark rounded rect
  const r = size * 0.18;
  ctx.fillStyle = '#0f172a';
  roundRect(ctx, 0, 0, size, size, r);
  ctx.fill();

  // Saffron border
  ctx.strokeStyle = '#F4C430';
  ctx.lineWidth = Math.max(1, size * 0.04);
  roundRect(ctx, ctx.lineWidth/2, ctx.lineWidth/2, size - ctx.lineWidth, size - ctx.lineWidth, r);
  ctx.stroke();

  // Microscope emoji as text (or fallback to "BK" monogram)
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  if (size >= 48) {
    // Large: microscope + "BK" text
    ctx.font = `${size * 0.35}px serif`;
    ctx.fillText('\uD83D\uDD2C', size/2, size * 0.38);

    ctx.fillStyle = '#F4C430';
    ctx.font = `bold ${size * 0.22}px system-ui`;
    ctx.fillText('BK', size/2, size * 0.72);
  } else if (size >= 32) {
    // Medium: just microscope
    ctx.font = `${size * 0.5}px serif`;
    ctx.fillText('\uD83D\uDD2C', size/2, size * 0.5);
  } else {
    // Small (16px): simple "B" monogram
    ctx.fillStyle = '#F4C430';
    ctx.font = `bold ${size * 0.65}px system-ui`;
    ctx.fillText('B', size/2, size * 0.55);
  }
}

function drawPwaIcon(canvas, size) {
  const ctx = canvas.getContext('2d');
  canvas.width = size;
  canvas.height = size;

  // Full saffron background (maskable icon)
  const r = size * 0.15;
  ctx.fillStyle = '#F4C430';
  roundRect(ctx, 0, 0, size, size, r);
  ctx.fill();

  // Dark circle in center
  ctx.fillStyle = '#0f172a';
  ctx.beginPath();
  ctx.arc(size/2, size/2, size * 0.35, 0, Math.PI * 2);
  ctx.fill();

  // Microscope
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = `${size * 0.3}px serif`;
  ctx.fillText('\uD83D\uDD2C', size/2, size * 0.45);

  // "BK" text below
  ctx.fillStyle = '#F4C430';
  ctx.font = `bold ${size * 0.14}px system-ui`;
  ctx.fillText('BioKhoj', size/2, size * 0.78);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function generateAll() {
  const container = document.getElementById('icons');
  container.innerHTML = '';
  SIZES.forEach(size => {
    const wrap = document.createElement('div');
    wrap.style.textAlign = 'center';
    const canvas = document.createElement('canvas');
    drawIcon(canvas, size);
    wrap.appendChild(canvas);
    const label = document.createElement('div');
    label.style.cssText = 'font-size:11px;color:#94a3b8;margin-top:4px';
    label.textContent = `icon${size}.png`;
    wrap.appendChild(label);
    container.appendChild(wrap);
  });

  const pwaContainer = document.getElementById('pwa-icons');
  pwaContainer.innerHTML = '';
  PWA_SIZES.forEach(size => {
    const wrap = document.createElement('div');
    wrap.style.textAlign = 'center';
    const canvas = document.createElement('canvas');
    drawPwaIcon(canvas, size);
    wrap.appendChild(canvas);
    const label = document.createElement('div');
    label.style.cssText = 'font-size:11px;color:#94a3b8;margin-top:4px';
    label.textContent = `icon-${size}.png`;
    wrap.appendChild(label);

    // Auto-download link
    const dl = document.createElement('a');
    dl.textContent = 'download';
    dl.style.cssText = 'font-size:10px;display:block;margin-top:2px;cursor:pointer';
    dl.addEventListener('click', () => {
      const link = document.createElement('a');
      link.download = `icon-${size}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    });
    wrap.appendChild(dl);

    pwaContainer.appendChild(wrap);
  });
}
</script>
</body>
</html>
