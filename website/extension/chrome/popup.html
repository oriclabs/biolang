<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 340px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 10px;
      border-bottom: 1px solid #1e293b;
    }
    .header svg { width: 28px; height: 28px; }
    .header h1 { font-size: 15px; font-weight: 700; color: #f8fafc; }
    .header span { font-size: 11px; color: #64748b; margin-left: auto; }

    /* Drop zone */
    .drop-zone {
      margin: 12px 16px;
      padding: 20px 16px;
      border: 2px dashed #334155;
      border-radius: 10px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: #7c3aed;
      background: rgba(124, 58, 237, 0.06);
    }
    .drop-zone svg { width: 32px; height: 32px; color: #475569; margin-bottom: 6px; }
    .drop-zone p { font-size: 12px; color: #94a3b8; line-height: 1.4; }
    .drop-zone .cta { color: #a78bfa; font-weight: 600; }

    /* Format tags */
    .formats {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      justify-content: center;
      margin-top: 8px;
    }
    .format-tag {
      font-size: 10px;
      font-family: "SF Mono", "Fira Code", monospace;
      padding: 1px 6px;
      border-radius: 4px;
      background: rgba(124, 58, 237, 0.12);
      color: #a78bfa;
    }

    /* Actions */
    .actions {
      display: flex;
      gap: 8px;
      padding: 0 16px 12px;
    }
    .btn {
      flex: 1;
      padding: 8px 12px;
      border-radius: 8px;
      border: none;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      font-family: inherit;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #7c3aed; color: #fff; }
    .btn-secondary { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }

    /* URL input */
    .url-section {
      padding: 0 16px 12px;
    }
    .url-row {
      display: flex;
      gap: 6px;
    }
    .url-input {
      flex: 1;
      padding: 7px 10px;
      border-radius: 6px;
      border: 1px solid #334155;
      background: #1e293b;
      color: #e2e8f0;
      font-size: 11px;
      font-family: "SF Mono", monospace;
      outline: none;
    }
    .url-input:focus { border-color: #7c3aed; }
    .url-input::placeholder { color: #475569; }
    .url-go {
      padding: 7px 12px;
      border-radius: 6px;
      border: none;
      background: #7c3aed;
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }

    /* Recent files */
    .recent {
      border-top: 1px solid #1e293b;
      padding: 10px 16px 12px;
    }
    .recent-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .recent-header h3 { font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
    .recent-clear { font-size: 10px; color: #475569; background: none; border: none; cursor: pointer; font-family: inherit; }
    .recent-clear:hover { color: #a78bfa; }
    .recent-list { display: flex; flex-direction: column; gap: 3px; max-height: 150px; overflow-y: auto; }
    .recent-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 8px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
      font-size: 11px;
    }
    .recent-item:hover { background: #1e293b; }
    .recent-badge {
      font-size: 9px;
      font-family: monospace;
      padding: 1px 5px;
      border-radius: 3px;
      background: rgba(124, 58, 237, 0.15);
      color: #a78bfa;
      text-transform: uppercase;
      font-weight: 600;
    }
    .recent-name { flex: 1; color: #cbd5e1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-family: monospace; font-size: 11px; }
    .recent-meta { color: #475569; font-size: 10px; white-space: nowrap; }

    .empty { padding: 20px 16px; text-align: center; color: #475569; font-size: 12px; }

    /* Status */
    .status { padding: 8px 16px; font-size: 11px; color: #22d3ee; display: none; }
  </style>
</head>
<body>
  <div class="header">
    <svg viewBox="0 0 32 32" fill="none">
      <rect x="2" y="4" width="28" height="24" rx="3" stroke="#7c3aed" stroke-width="1.5"/>
      <path d="M8 12h16M8 16h12M8 20h14" stroke="#a78bfa" stroke-width="1.2" stroke-linecap="round"/>
      <circle cx="24" cy="20" r="3" fill="#7c3aed" opacity="0.4"/>
    </svg>
    <h1>BLViewer</h1>
    <span>v1.0</span>
  </div>

  <div class="drop-zone" id="drop-zone">
    <svg viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.5">
      <rect x="4" y="8" width="32" height="26" rx="3" stroke-dasharray="3 2"/>
      <path d="M20 14v10M15 19l5-5 5 5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <p><span class="cta">Click to open</span> or drag files here</p>
    <div class="formats">
      <span class="format-tag">.fasta</span>
      <span class="format-tag">.fastq</span>
      <span class="format-tag">.vcf</span>
      <span class="format-tag">.bed</span>
      <span class="format-tag">.gff</span>
      <span class="format-tag">.sam</span>
      <span class="format-tag">.csv</span>
    </div>
  </div>

  <div class="url-section">
    <div class="url-row">
      <input class="url-input" id="url-input" type="text" placeholder="https://example.com/data.vcf">
      <button class="url-go" id="url-go">Open URL</button>
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-primary" id="open-viewer">Open Full Viewer</button>
    <button class="btn btn-secondary" id="open-file">Browse Files</button>
  </div>

  <div class="actions" style="padding-top:0">
    <button class="btn btn-secondary" id="open-help" style="flex:none; padding:8px 14px; font-size:11px; color:#a78bfa; border-color:rgba(124,58,237,0.3);">? Help</button>
  </div>

  <div class="status" id="status"></div>

  <div class="recent" id="recent-section" style="display:none">
    <div class="recent-header">
      <h3>Recent Files</h3>
      <button class="recent-clear" id="clear-recent">Clear</button>
    </div>
    <div class="recent-list" id="recent-list"></div>
  </div>

  <input type="file" id="file-input" multiple accept=".fasta,.fa,.fna,.faa,.fastq,.fq,.vcf,.bed,.gff,.gff3,.gtf,.sam,.csv,.tsv,.txt" style="display:none">

  <script src="popup.js"></script>
</body>
</html>
