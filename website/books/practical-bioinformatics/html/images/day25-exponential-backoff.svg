<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
  </defs>
  <rect width="800" height="260" rx="12" fill="url(#bg)"/>
  <text x="400" y="36" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#0f172a">Exponential Backoff</text>

  <!-- Axis -->
  <line x1="160" y1="220" x2="740" y2="220" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="740" y="245" text-anchor="end" font-family="system-ui" font-size="12" fill="#64748b">time</text>

  <!-- Attempt 1 -->
  <text x="145" y="85" text-anchor="end" font-family="system-ui" font-size="12" fill="#475569">Attempt 1</text>
  <text x="145" y="100" text-anchor="end" font-family="system-ui" font-size="11" fill="#94a3b8">wait 1s</text>
  <rect x="170" y="75" width="30" height="24" rx="4" fill="#3b82f6"/>

  <!-- Attempt 2 -->
  <text x="145" y="120" text-anchor="end" font-family="system-ui" font-size="12" fill="#475569">Attempt 2</text>
  <text x="145" y="135" text-anchor="end" font-family="system-ui" font-size="11" fill="#94a3b8">wait 2s</text>
  <rect x="170" y="110" width="60" height="24" rx="4" fill="#3b82f6"/>

  <!-- Attempt 3 -->
  <text x="145" y="155" text-anchor="end" font-family="system-ui" font-size="12" fill="#475569">Attempt 3</text>
  <text x="145" y="170" text-anchor="end" font-family="system-ui" font-size="11" fill="#94a3b8">wait 4s</text>
  <rect x="170" y="145" width="120" height="24" rx="4" fill="#eab308"/>

  <!-- Attempt 4 -->
  <text x="145" y="190" text-anchor="end" font-family="system-ui" font-size="12" fill="#475569">Attempt 4</text>
  <text x="145" y="205" text-anchor="end" font-family="system-ui" font-size="11" fill="#94a3b8">wait 8s</text>
  <rect x="170" y="180" width="240" height="24" rx="4" fill="#ef4444"/>

  <!-- Attempt 5 -->
  <text x="145" y="225" text-anchor="end" font-family="system-ui" font-size="12" fill="#475569">Attempt 5</text>
  <text x="145" y="240" text-anchor="end" font-family="system-ui" font-size="11" fill="#94a3b8">wait 16s</text>
  <rect x="170" y="215" width="480" height="10" rx="4" fill="#dc2626" opacity="0.6"/>

  <!-- Legend -->
  <text x="500" y="82" font-family="system-ui" font-size="11" fill="#64748b">Each retry doubles the wait time,</text>
  <text x="500" y="98" font-family="system-ui" font-size="11" fill="#64748b">giving the server time to recover.</text>
  <text x="500" y="120" font-family="system-ui" font-size="11" fill="#64748b">Capped at 30s to prevent</text>
  <text x="500" y="136" font-family="system-ui" font-size="11" fill="#64748b">absurdly long waits.</text>
</svg>