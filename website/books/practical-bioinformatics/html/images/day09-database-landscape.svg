<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="800" height="500" rx="12" fill="url(#bg)"/>
  <text x="400" y="38" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#0f172a">Biological Database Landscape</text>
  <text x="400" y="58" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#64748b">No single database has the complete picture</text>

  <!-- Central node -->
  <rect x="310" y="210" width="180" height="60" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="400" y="236" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#1e40af">Your Gene / Variant</text>
  <text x="400" y="256" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#3b82f6">Query starting point</text>

  <!-- NCBI (top-left) -->
  <rect x="40" y="80" width="170" height="55" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="125" y="103" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#166534">NCBI</text>
  <text x="125" y="121" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#166534">sequences, genes, literature</text>
  <line x1="210" y1="135" x2="330" y2="210" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Ensembl (top) -->
  <rect x="315" y="80" width="170" height="55" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="400" y="103" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#166534">Ensembl</text>
  <text x="400" y="121" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#166534">gene models, variants</text>
  <line x1="400" y1="135" x2="400" y2="210" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- UniProt (top-right) -->
  <rect x="590" y="80" width="170" height="55" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="675" y="103" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#5b21b6">UniProt</text>
  <text x="675" y="121" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#5b21b6">protein function</text>
  <line x1="590" y1="135" x2="470" y2="210" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- KEGG (left) -->
  <rect x="20" y="210" width="170" height="55" rx="8" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="105" y="233" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#854d0e">KEGG</text>
  <text x="105" y="251" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#854d0e">pathways, metabolism</text>
  <line x1="190" y1="237" x2="310" y2="237" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- PDB (right) -->
  <rect x="610" y="210" width="170" height="55" rx="8" fill="#fed7aa" stroke="#f97316" stroke-width="1.5"/>
  <text x="695" y="233" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#9a3412">PDB</text>
  <text x="695" y="251" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#9a3412">3D structures</text>
  <line x1="610" y1="237" x2="490" y2="237" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- STRING (bottom-left) -->
  <rect x="40" y="350" width="170" height="55" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="125" y="373" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#5b21b6">STRING</text>
  <text x="125" y="391" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#5b21b6">protein interactions</text>
  <line x1="210" y1="350" x2="330" y2="270" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Gene Ontology (bottom) -->
  <rect x="315" y="350" width="170" height="55" rx="8" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="400" y="373" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#854d0e">Gene Ontology</text>
  <text x="400" y="391" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#854d0e">functional terms</text>
  <line x1="400" y1="350" x2="400" y2="270" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Reactome (bottom-right) -->
  <rect x="590" y="350" width="170" height="55" rx="8" fill="#fed7aa" stroke="#f97316" stroke-width="1.5"/>
  <text x="675" y="373" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#9a3412">Reactome</text>
  <text x="675" y="391" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#9a3412">biological pathways</text>
  <line x1="590" y1="350" x2="470" y2="270" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>