<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <marker id="arrow-r" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-l" viewBox="0 0 10 7" refX="0" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-auto">
      <path d="M 10 0 L 0 3.5 L 10 7 z" fill="#22c55e"/>
    </marker>
  </defs>
  <rect width="800" height="440" rx="12" fill="url(#bg)"/>
  <text x="400" y="36" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#0f172a">Plugin Execution Flow</text>

  <!-- BioLang Runtime column -->
  <rect x="40" y="55" width="300" height="365" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="190" y="82" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="700" fill="#1e40af">BioLang Runtime</text>

  <!-- Plugin Process column -->
  <rect x="460" y="55" width="300" height="365" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="610" y="82" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="700" fill="#166534">Plugin Process</text>

  <!-- Step 1: Spawn -->
  <text x="190" y="115" text-anchor="middle" font-family="system-ui" font-size="12" fill="#1e40af">spawn process</text>
  <line x1="340" y1="110" x2="460" y2="110" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-r)"/>

  <!-- Step 2: JSON request on stdin -->
  <rect x="60" y="135" width="260" height="110" rx="6" fill="white" stroke="#bfdbfe" stroke-width="1"/>
  <text x="190" y="155" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#475569">JSON request on stdin</text>
  <text x="80" y="175" font-family="monospace" font-size="10" fill="#64748b">{</text>
  <text x="90" y="190" font-family="monospace" font-size="10" fill="#64748b">"protocol_version": "1",</text>
  <text x="90" y="205" font-family="monospace" font-size="10" fill="#64748b">"op": "analyze",</text>
  <text x="90" y="220" font-family="monospace" font-size="10" fill="#64748b">"params": { ... }</text>
  <text x="80" y="235" font-family="monospace" font-size="10" fill="#64748b">}</text>

  <line x1="320" y1="190" x2="460" y2="190" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-r)"/>

  <!-- Plugin runs -->
  <rect x="490" y="155" width="240" height="40" rx="6" fill="white" stroke="#bbf7d0" stroke-width="1"/>
  <text x="610" y="180" text-anchor="middle" font-family="system-ui" font-size="12" fill="#166534" font-style="italic">plugin runs...</text>

  <!-- Step 3: JSON response on stdout -->
  <rect x="480" y="225" width="260" height="95" rx="6" fill="white" stroke="#bbf7d0" stroke-width="1"/>
  <text x="610" y="245" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#475569">JSON response on stdout</text>
  <text x="500" y="265" font-family="monospace" font-size="10" fill="#64748b">{</text>
  <text x="510" y="280" font-family="monospace" font-size="10" fill="#64748b">"exit_code": 0,</text>
  <text x="510" y="295" font-family="monospace" font-size="10" fill="#64748b">"outputs": { ... }</text>
  <text x="500" y="310" font-family="monospace" font-size="10" fill="#64748b">}</text>

  <line x1="480" y1="280" x2="340" y2="280" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-l)"/>

  <!-- Step 4: Convert -->
  <rect x="60" y="340" width="260" height="55" rx="6" fill="white" stroke="#bfdbfe" stroke-width="1"/>
  <text x="190" y="363" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#1e40af">Convert outputs to</text>
  <text x="190" y="381" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#1e40af">BioLang values</text>
</svg>