<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" rx="12" fill="url(#bg)"/>
  <text x="400" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#0f172a">Expected Tree Topology</text>
  <text x="400" y="55" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#64748b">Phylogenetic grouping expected from known species relationships</text>

  <!-- Tree structure using lines -->
  <!-- Root -->
  <line x1="120" y1="200" x2="200" y2="200" stroke="#334155" stroke-width="2"/>

  <!-- Root splits to (animals clade) and yeast -->
  <line x1="200" y1="200" x2="200" y2="350" stroke="#334155" stroke-width="2"/>
  <line x1="200" y1="170" x2="200" y2="200" stroke="#334155" stroke-width="2"/>
  <line x1="200" y1="170" x2="260" y2="170" stroke="#334155" stroke-width="2"/>

  <!-- Yeast (outgroup) -->
  <line x1="200" y1="350" x2="600" y2="350" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6,3"/>
  <rect x="600" y="338" width="120" height="24" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="660" y="355" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#64748b">Yeast*</text>

  <!-- Worm branch -->
  <line x1="260" y1="170" x2="260" y2="310" stroke="#334155" stroke-width="2"/>
  <line x1="260" y1="310" x2="600" y2="310" stroke="#8b5cf6" stroke-width="2"/>
  <rect x="600" y="298" width="120" height="24" rx="6" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1"/>
  <text x="660" y="315" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#5b21b6">Worm</text>

  <!-- Animals-Insects split -->
  <line x1="260" y1="145" x2="260" y2="170" stroke="#334155" stroke-width="2"/>
  <line x1="260" y1="145" x2="320" y2="145" stroke="#334155" stroke-width="2"/>

  <!-- Fly branch -->
  <line x1="320" y1="145" x2="320" y2="270" stroke="#334155" stroke-width="2"/>
  <line x1="320" y1="270" x2="600" y2="270" stroke="#f97316" stroke-width="2"/>
  <rect x="600" y="258" width="120" height="24" rx="6" fill="#fed7aa" stroke="#f97316" stroke-width="1"/>
  <text x="660" y="275" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#9a3412">Fly</text>

  <!-- Vertebrate split -->
  <line x1="320" y1="120" x2="320" y2="145" stroke="#334155" stroke-width="2"/>
  <line x1="320" y1="120" x2="380" y2="120" stroke="#334155" stroke-width="2"/>

  <!-- Zebrafish -->
  <line x1="380" y1="120" x2="380" y2="230" stroke="#334155" stroke-width="2"/>
  <line x1="380" y1="230" x2="600" y2="230" stroke="#eab308" stroke-width="2"/>
  <rect x="600" y="218" width="120" height="24" rx="6" fill="#fef9c3" stroke="#eab308" stroke-width="1"/>
  <text x="660" y="235" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#854d0e">Zebrafish</text>

  <!-- Tetrapod split -->
  <line x1="380" y1="100" x2="380" y2="120" stroke="#334155" stroke-width="2"/>
  <line x1="380" y1="100" x2="440" y2="100" stroke="#334155" stroke-width="2"/>

  <!-- Frog -->
  <line x1="440" y1="100" x2="440" y2="190" stroke="#334155" stroke-width="2"/>
  <line x1="440" y1="190" x2="600" y2="190" stroke="#22c55e" stroke-width="2"/>
  <rect x="600" y="178" width="120" height="24" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="660" y="195" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#166534">Frog</text>

  <!-- Chicken -->
  <line x1="440" y1="85" x2="440" y2="100" stroke="#334155" stroke-width="2"/>
  <line x1="440" y1="85" x2="500" y2="85" stroke="#334155" stroke-width="2"/>
  <line x1="500" y1="85" x2="500" y2="150" stroke="#334155" stroke-width="2"/>
  <line x1="500" y1="150" x2="600" y2="150" stroke="#22c55e" stroke-width="2"/>
  <rect x="600" y="138" width="120" height="24" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="660" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#166534">Chicken</text>

  <!-- Mammal split -->
  <line x1="500" y1="78" x2="500" y2="85" stroke="#334155" stroke-width="2"/>
  <line x1="500" y1="78" x2="560" y2="78" stroke="#334155" stroke-width="2"/>

  <!-- Human -->
  <line x1="560" y1="78" x2="560" y2="110" stroke="#334155" stroke-width="2"/>
  <line x1="560" y1="110" x2="600" y2="110" stroke="#3b82f6" stroke-width="2"/>
  <rect x="600" y="98" width="120" height="24" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="660" y="115" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#1e40af">Human</text>

  <!-- Mouse -->
  <line x1="560" y1="78" x2="600" y2="78" stroke="#3b82f6" stroke-width="2"/>
  <rect x="600" y="66" width="120" height="24" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="660" y="83" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#1e40af">Mouse</text>

  <!-- Note -->
  <text x="400" y="388" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b">* Yeast (RAD9) should appear as the most distant outgroup</text>
</svg>