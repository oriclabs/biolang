<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="800" height="620" rx="12" fill="url(#bg)"/>
  <text x="400" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#0f172a">ACMG/AMP Variant Classification</text>
  <text x="400" y="62" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#64748b">Five-tier evidence-based classification system (simplified)</text>

  <!-- Tier 1: Pathogenic -->
  <rect x="100" y="90" width="260" height="75" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="120" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#991b1b">PATHOGENIC (Class 5)</text>
  <text x="120" y="135" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#991b1b">Known disease-causing</text>
  <text x="120" y="150" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#991b1b">Null variant in LOF gene</text>

  <!-- Evidence column -->
  <rect x="440" y="90" width="310" height="75" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="460" y="112" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#991b1b">Evidence criteria:</text>
  <text x="460" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#7f1d1d">- Same AA change as established pathogenic</text>
  <text x="460" y="148" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#7f1d1d">- Well-established functional studies</text>

  <line x1="230" y1="165" x2="230" y2="195" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Tier 2: Likely Pathogenic -->
  <rect x="100" y="200" width="260" height="75" rx="8" fill="#fed7aa" stroke="#f97316" stroke-width="2"/>
  <text x="120" y="225" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#9a3412">LIKELY PATHOGENIC (Class 4)</text>
  <text x="120" y="245" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#9a3412">Strong functional evidence</text>
  <text x="120" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#9a3412">In known mutational hotspot</text>

  <rect x="440" y="200" width="310" height="75" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="1"/>
  <text x="460" y="222" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#9a3412">Evidence criteria:</text>
  <text x="460" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#7c2d12">- Absent from population databases</text>
  <text x="460" y="258" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#7c2d12">- Strong computational evidence</text>

  <line x1="230" y1="275" x2="230" y2="305" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Tier 3: VUS -->
  <rect x="100" y="310" width="260" height="75" rx="8" fill="#fef9c3" stroke="#eab308" stroke-width="2"/>
  <text x="120" y="335" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#854d0e">VUS (Class 3)</text>
  <text x="120" y="355" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#854d0e">Insufficient evidence to classify</text>
  <text x="120" y="370" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#854d0e">Novel missense, some in controls</text>

  <rect x="440" y="310" width="310" height="75" rx="8" fill="#fefce8" stroke="#fde047" stroke-width="1"/>
  <text x="460" y="332" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#854d0e">Evidence criteria:</text>
  <text x="460" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#713f12">- Conflicting or insufficient data</text>
  <text x="460" y="368" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#713f12">- Requires periodic reclassification</text>

  <line x1="230" y1="385" x2="230" y2="415" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Tier 4: Likely Benign -->
  <rect x="100" y="420" width="260" height="65" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="120" y="445" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#1e40af">LIKELY BENIGN (Class 2)</text>
  <text x="120" y="465" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#1e40af">Some population frequency; in silico tolerated</text>

  <rect x="440" y="420" width="310" height="65" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="460" y="442" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#1e40af">Evidence criteria:</text>
  <text x="460" y="460" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#1e3a8a">- Computational tools predict tolerated</text>

  <line x1="230" y1="485" x2="230" y2="515" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Tier 5: Benign -->
  <rect x="100" y="520" width="260" height="65" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="120" y="545" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#166534">BENIGN (Class 1)</text>
  <text x="120" y="565" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#166534">Common in population (AF > 5%); no clinical reports</text>

  <rect x="440" y="520" width="310" height="65" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="460" y="542" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#166534">Evidence criteria:</text>
  <text x="460" y="560" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#14532d">- Stand-alone population frequency (BA1)</text>
</svg>