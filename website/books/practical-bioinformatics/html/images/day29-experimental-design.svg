<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="800" height="400" rx="12" fill="url(#bg)"/>
  <text x="400" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#0f172a">Experimental Design</text>
  <text x="400" y="55" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#64748b">Two conditions, three biological replicates each</text>

  <!-- Control group -->
  <rect x="60" y="80" width="250" height="140" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="185" y="105" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#1e40af">Control (DMSO vehicle)</text>
  <rect x="90" y="115" width="190" height="30" rx="6" fill="white" stroke="#93c5fd" stroke-width="1"/>
  <text x="185" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#1e40af">ctrl_1</text>
  <rect x="90" y="150" width="190" height="30" rx="6" fill="white" stroke="#93c5fd" stroke-width="1"/>
  <text x="185" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#1e40af">ctrl_2</text>
  <rect x="90" y="185" width="190" height="30" rx="6" fill="white" stroke="#93c5fd" stroke-width="1"/>
  <text x="185" y="205" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#1e40af">ctrl_3</text>

  <!-- Treated group -->
  <rect x="490" y="80" width="250" height="140" rx="8" fill="#fed7aa" stroke="#f97316" stroke-width="1.5"/>
  <text x="615" y="105" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#9a3412">Treated (Drug, 10 uM, 24h)</text>
  <rect x="520" y="115" width="190" height="30" rx="6" fill="white" stroke="#fdba74" stroke-width="1"/>
  <text x="615" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#9a3412">treat_1</text>
  <rect x="520" y="150" width="190" height="30" rx="6" fill="white" stroke="#fdba74" stroke-width="1"/>
  <text x="615" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#9a3412">treat_2</text>
  <rect x="520" y="185" width="190" height="30" rx="6" fill="white" stroke="#fdba74" stroke-width="1"/>
  <text x="615" y="205" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#9a3412">treat_3</text>

  <!-- Arrows down -->
  <line x1="185" y1="220" x2="185" y2="255" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="615" y1="220" x2="615" y2="255" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Processing pipeline -->
  <rect x="80" y="260" width="640" height="40" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="400" y="285" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#166534">RNA extraction  ->  Library prep  ->  Sequencing  ->  Alignment  ->  Counting</text>

  <!-- Arrow to output -->
  <line x1="400" y1="300" x2="400" y2="335" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Output -->
  <rect x="280" y="340" width="240" height="45" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="400" y="360" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#0f172a">counts.tsv</text>
  <text x="400" y="376" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b">gene x 6 samples</text>
</svg>