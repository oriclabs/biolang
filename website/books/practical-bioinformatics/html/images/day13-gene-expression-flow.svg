<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bg13e" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
    <marker id="arr13e" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="800" height="420" rx="12" fill="url(#bg13e)"/>
  <text x="400" y="35" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="bold" fill="#0f172a">Gene Expression: DNA to Protein</text>

  <!-- Column headers -->
  <text x="280" y="65" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="bold" fill="#1e40af">Gene A (active)</text>
  <text x="580" y="65" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="bold" fill="#991b1b">Gene B (silent)</text>

  <!-- DNA row -->
  <text x="60" y="110" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#0f172a">DNA</text>
  <rect x="120" y="90" width="560" height="30" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="400" y="110" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#1e40af">======= Gene A ======= | ======= Gene B =======</text>

  <!-- Arrow down from Gene A -->
  <line x1="280" y1="120" x2="280" y2="155" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr13e)"/>

  <!-- Transcription box -->
  <rect x="210" y="158" width="140" height="32" rx="8" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="280" y="179" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#854d0e">Transcription</text>

  <!-- No arrow from Gene B - X mark -->
  <line x1="560" y1="125" x2="600" y2="155" stroke="#ef4444" stroke-width="3"/>
  <line x1="600" y1="125" x2="560" y2="155" stroke="#ef4444" stroke-width="3"/>
  <text x="580" y="175" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#991b1b">blocked</text>

  <!-- Arrow down -->
  <line x1="280" y1="190" x2="280" y2="220" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr13e)"/>

  <!-- mRNA row -->
  <text x="60" y="245" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#0f172a">mRNA</text>
  <text x="200" y="240" font-family="system-ui,sans-serif" font-size="13" fill="#8b5cf6">~~~~~~ ~~~~~~</text>
  <text x="200" y="255" font-family="system-ui,sans-serif" font-size="13" fill="#8b5cf6">~~~~~~ ~~~~~~</text>
  <text x="200" y="270" font-family="system-ui,sans-serif" font-size="13" fill="#8b5cf6">~~~~~~</text>
  <text x="215" y="288" font-family="system-ui,sans-serif" font-size="11" fill="#6b21a8">(many copies)</text>

  <text x="550" y="255" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8">(none)</text>

  <!-- Arrow down -->
  <line x1="280" y1="295" x2="280" y2="320" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr13e)"/>

  <!-- Translation box -->
  <rect x="210" y="323" width="140" height="32" rx="8" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="280" y="344" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#854d0e">Translation</text>

  <!-- Arrow down -->
  <line x1="280" y1="355" x2="280" y2="375" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr13e)"/>

  <!-- Protein row -->
  <text x="60" y="395" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#0f172a">Protein</text>
  <circle cx="210" cy="392" r="8" fill="#22c55e"/>
  <circle cx="230" cy="392" r="8" fill="#22c55e"/>
  <circle cx="250" cy="392" r="8" fill="#22c55e"/>
  <circle cx="270" cy="392" r="8" fill="#22c55e"/>
  <circle cx="290" cy="392" r="8" fill="#22c55e"/>
  <circle cx="310" cy="392" r="8" fill="#22c55e"/>
  <circle cx="330" cy="392" r="8" fill="#22c55e"/>
  <text x="265" y="413" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#166534">(abundant)</text>

  <text x="550" y="395" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8">(none)</text>
</svg>