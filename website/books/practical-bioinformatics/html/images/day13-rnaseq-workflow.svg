<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 180">
  <defs>
    <linearGradient id="bg13w" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
    <marker id="arr13" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="800" height="180" rx="12" fill="url(#bg13w)"/>
  <text x="400" y="35" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="bold" fill="#0f172a">RNA-seq Workflow</text>

  <!-- Cells -->
  <rect x="20" y="65" width="80" height="45" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="60" y="92" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#1e40af">Cells</text>

  <line x1="100" y1="87" x2="128" y2="87" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr13)"/>
  <text x="114" y="80" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">extract RNA</text>

  <!-- mRNA -->
  <rect x="132" y="65" width="80" height="45" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="172" y="92" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#1e40af">mRNA</text>

  <line x1="212" y1="87" x2="240" y2="87" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr13)"/>
  <text x="226" y="80" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">sequence</text>

  <!-- FASTQ -->
  <rect x="244" y="65" width="80" height="45" rx="8" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="284" y="92" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#854d0e">FASTQ</text>

  <line x1="324" y1="87" x2="352" y2="87" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr13)"/>
  <text x="338" y="80" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">align</text>

  <!-- BAM -->
  <rect x="356" y="65" width="80" height="45" rx="8" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="396" y="92" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#854d0e">BAM</text>

  <line x1="436" y1="87" x2="464" y2="87" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr13)"/>
  <text x="450" y="80" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">count</text>

  <!-- Counts -->
  <rect x="468" y="65" width="80" height="45" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="508" y="92" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#5b21b6">Counts</text>

  <line x1="548" y1="87" x2="576" y2="87" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr13)"/>
  <text x="562" y="80" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">normalize</text>

  <!-- TPM -->
  <rect x="580" y="65" width="80" height="45" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="620" y="92" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#5b21b6">TPM</text>

  <line x1="660" y1="87" x2="688" y2="87" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr13)"/>
  <text x="674" y="80" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">compare</text>

  <!-- DE Results -->
  <rect x="692" y="65" width="90" height="45" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="737" y="85" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#166534">DE</text>
  <text x="737" y="100" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#166534">Results</text>

  <!-- Legend -->
  <text x="400" y="145" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">Blue = biological | Yellow = data formats | Purple = analysis | Green = results</text>
</svg>