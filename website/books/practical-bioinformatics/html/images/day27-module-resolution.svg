<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="800" height="480" rx="12" fill="url(#bg)"/>
  <text x="400" y="36" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#0f172a">Module Resolution Order</text>

  <!-- Import statement -->
  <rect x="220" y="55" width="360" height="38" rx="8" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="400" y="79" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="600" font-family="monospace" fill="#854d0e">import "lib/seq_utils.bl"</text>

  <line x1="400" y1="93" x2="400" y2="118" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 1 -->
  <rect x="200" y="123" width="400" height="55" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="230" y="147" font-family="system-ui" font-size="14" font-weight="700" fill="#1e40af">1.</text>
  <text x="255" y="147" font-family="system-ui" font-size="13" font-weight="600" fill="#1e40af">Relative to importing file</text>
  <text x="255" y="167" font-family="system-ui" font-size="11" fill="#3b82f6">./lib/seq_utils.bl</text>
  <text x="540" y="155" font-family="system-ui" font-size="12" font-weight="600" fill="#166534">Found? LOAD</text>

  <line x1="400" y1="178" x2="400" y2="200" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="420" y="194" font-family="system-ui" font-size="10" fill="#94a3b8">not found</text>

  <!-- Step 2 -->
  <rect x="200" y="205" width="400" height="55" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="230" y="229" font-family="system-ui" font-size="14" font-weight="700" fill="#166534">2.</text>
  <text x="255" y="229" font-family="system-ui" font-size="13" font-weight="600" fill="#166534">$BIOLANG_PATH directories</text>
  <text x="255" y="249" font-family="system-ui" font-size="11" fill="#22c55e">Each dir in BIOLANG_PATH</text>
  <text x="540" y="237" font-family="system-ui" font-size="12" font-weight="600" fill="#166534">Found? LOAD</text>

  <line x1="400" y1="260" x2="400" y2="282" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="420" y="276" font-family="system-ui" font-size="10" fill="#94a3b8">not found</text>

  <!-- Step 3 -->
  <rect x="200" y="287" width="400" height="55" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="230" y="311" font-family="system-ui" font-size="14" font-weight="700" fill="#5b21b6">3.</text>
  <text x="255" y="311" font-family="system-ui" font-size="13" font-weight="600" fill="#5b21b6">~/.biolang/stdlib/</text>
  <text x="255" y="331" font-family="system-ui" font-size="11" fill="#7c3aed">Global stdlib fallback</text>
  <text x="540" y="319" font-family="system-ui" font-size="12" font-weight="600" fill="#166534">Found? LOAD</text>

  <line x1="400" y1="342" x2="400" y2="364" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="420" y="358" font-family="system-ui" font-size="10" fill="#94a3b8">not found</text>

  <!-- Step 4 -->
  <rect x="200" y="369" width="400" height="55" rx="8" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="230" y="393" font-family="system-ui" font-size="14" font-weight="700" fill="#854d0e">4.</text>
  <text x="255" y="393" font-family="system-ui" font-size="13" font-weight="600" fill="#854d0e">Plugin lookup</text>
  <text x="255" y="413" font-family="system-ui" font-size="11" fill="#92400e">Check ~/.biolang/plugins/</text>
  <text x="540" y="401" font-family="system-ui" font-size="12" font-weight="600" fill="#166534">Found? LOAD</text>

  <line x1="400" y1="424" x2="400" y2="446" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="420" y="440" font-family="system-ui" font-size="10" fill="#94a3b8">not found</text>

  <!-- Error -->
  <rect x="330" y="450" width="140" height="24" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="400" y="467" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="700" fill="#dc2626">ERROR</text>
</svg>