<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <linearGradient id="bg12" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
  </defs>
  <rect width="800" height="380" rx="12" fill="url(#bg12)"/>
  <text x="400" y="40" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="bold" fill="#0f172a">VCF Variant Filtering Funnel</text>

  <!-- Raw variants box -->
  <rect x="250" y="65" width="300" height="50" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="400" y="95" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="600" fill="#1e40af">48 Raw Variants</text>

  <!-- Arrow down -->
  <line x1="400" y1="115" x2="400" y2="145" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead12)"/>
  <defs><marker id="arrowhead12" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/></marker></defs>

  <!-- PASS filter diamond -->
  <rect x="275" y="150" width="250" height="50" rx="8" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="400" y="180" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#854d0e">PASS filter?</text>

  <!-- Branch right: removed -->
  <line x1="525" y1="175" x2="620" y2="175" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead12)"/>
  <rect x="625" y="150" width="140" height="50" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="695" y="172" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#991b1b">7 Removed</text>
  <text x="695" y="190" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#991b1b">(LowQual / LowDP)</text>
  <text x="572" y="168" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">No</text>

  <!-- Arrow down: 41 pass -->
  <line x1="400" y1="200" x2="400" y2="230" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead12)"/>
  <text x="420" y="220" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">41 pass</text>

  <!-- Quality filter -->
  <rect x="275" y="235" width="250" height="50" rx="8" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="400" y="265" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#854d0e">Quality >= 30?</text>

  <!-- Branch right: 0 removed -->
  <line x1="525" y1="260" x2="620" y2="260" stroke="#94a3b8" stroke-width="2"/>
  <text x="630" y="264" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">0 removed</text>

  <!-- Arrow down -->
  <line x1="400" y1="285" x2="400" y2="315" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead12)"/>
  <text x="420" y="305" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">41 pass</text>

  <!-- Final box -->
  <rect x="225" y="320" width="350" height="50" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="400" y="350" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="600" fill="#166534">41 High-Quality Variants</text>
</svg>