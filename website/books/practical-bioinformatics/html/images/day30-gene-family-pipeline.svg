<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 860">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="800" height="860" rx="12" fill="url(#bg)"/>
  <text x="400" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#0f172a">Multi-Species Gene Family Analysis Pipeline</text>
  <text x="400" y="62" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#64748b">Six-stage comparative genomics workflow with three input branches</text>

  <!-- Input branches -->
  <rect x="40" y="90" width="220" height="60" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="150" y="115" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#1e40af">ORTHOLOG IDENTIFIC.</text>
  <text x="150" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#1e40af">(API lookup)</text>

  <rect x="290" y="90" width="220" height="60" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="400" y="115" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#5b21b6">SEQUENCE RETRIEVAL</text>
  <text x="400" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#5b21b6">(FASTA per species)</text>

  <rect x="540" y="90" width="220" height="60" rx="8" fill="#fed7aa" stroke="#f97316" stroke-width="1.5"/>
  <text x="650" y="115" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#9a3412">DOMAIN &amp; ANNOTATION</text>
  <text x="650" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#9a3412">(UniProt, InterPro)</text>

  <!-- Arrows from input -->
  <line x1="150" y1="150" x2="150" y2="195" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="150" x2="300" y2="195" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 1 -->
  <rect x="60" y="200" width="380" height="60" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="80" y="225" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#1e40af">1. PAIRWISE COMPARISON</text>
  <text x="80" y="245" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#1e40af">Dotplot, k-mer similarity</text>

  <line x1="250" y1="260" x2="250" y2="295" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 2 -->
  <rect x="60" y="300" width="380" height="60" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="80" y="325" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#5b21b6">2. CONSERVATION SCORING</text>
  <text x="80" y="345" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#5b21b6">Per-position, per-region analysis</text>

  <line x1="250" y1="360" x2="400" y2="395" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Domain annotation arrow -->
  <line x1="650" y1="150" x2="650" y2="405" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6,3"/>
  <line x1="650" y1="405" x2="620" y2="405" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- Stage 3 -->
  <rect x="60" y="400" width="680" height="50" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="80" y="430" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#166534">3. DISTANCE MATRIX</text>
  <text x="260" y="430" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#166534">k-mer divergence, identity estimation</text>

  <line x1="400" y1="450" x2="400" y2="485" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 4 -->
  <rect x="60" y="490" width="680" height="50" rx="8" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="80" y="520" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#854d0e">4. PHYLOGENETIC TREE</text>
  <text x="280" y="520" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#854d0e">Neighbor-joining from distance matrix</text>

  <line x1="400" y1="540" x2="400" y2="575" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 5 -->
  <rect x="60" y="580" width="680" height="50" rx="8" fill="#fed7aa" stroke="#f97316" stroke-width="1.5"/>
  <text x="80" y="610" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#9a3412">5. FUNCTIONAL DIVERGENCE</text>
  <text x="310" y="610" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#9a3412">Evolutionary rate analysis, domain conservation scoring</text>

  <line x1="400" y1="630" x2="400" y2="665" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 6 -->
  <rect x="60" y="670" width="680" height="50" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="80" y="700" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#166534">6. INTEGRATION &amp; REPORT</text>
  <text x="302" y="700" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#166534">Cross-species summary, conservation map, evolutionary insights</text>

  <!-- Output -->
  <line x1="400" y1="720" x2="400" y2="755" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="150" y="760" width="500" height="70" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="400" y="785" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748b">distance_matrix.tsv, domain_conservation.tsv, evolutionary_rates.tsv</text>
  <text x="400" y="805" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748b">dotplots, conservation_profile.svg, phylo_tree.svg, rate plots</text>
</svg>