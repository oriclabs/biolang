<svg viewBox="0 0 800 520" xmlns="http://www.w3.org/2000/svg" style="background: #fff;">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#6b7280"/>
    </marker>
    <linearGradient id="helixBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" fill="url(#helixBg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#0f172a">The DNA Double Helix</text>
  <text x="400" y="56" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">Two complementary strands wound around each other</text>

  <!-- === LEFT: Double Helix Structure === -->

  <!-- 5' / 3' labels -->
  <text x="95" y="88" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#2563eb">5'</text>
  <text x="245" y="88" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#dc2626">3'</text>

  <!-- Strand backbones -->
  <!-- Left strand (blue, 5'→3' going down) -->
  <path d="M95,95 C95,130 95,130 105,155 C115,180 85,210 95,240 C105,270 115,290 105,320 C95,350 95,370 95,400"
        stroke="#3b82f6" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Right strand (red, 3'→5' going down) -->
  <path d="M245,95 C245,130 245,130 235,155 C225,180 255,210 245,240 C235,270 225,290 235,320 C245,350 245,370 245,400"
        stroke="#dc2626" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Base pairs (rungs of the ladder) -->
  <!-- Pair 1: A-T -->
  <rect x="108" y="108" width="40" height="22" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="128" y="123" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#1e40af">A</text>
  <line x1="148" y1="119" x2="180" y2="119" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="156" y1="115" x2="156" y2="123" stroke="#94a3b8" stroke-width="1"/>
  <line x1="170" y1="115" x2="170" y2="123" stroke="#94a3b8" stroke-width="1"/>
  <rect x="180" y="108" width="40" height="22" rx="4" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="200" y="123" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#991b1b">T</text>

  <!-- Pair 2: T-A -->
  <rect x="118" y="155" width="40" height="22" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="138" y="170" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#1e40af">T</text>
  <line x1="158" y1="166" x2="185" y2="166" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="165" y1="162" x2="165" y2="170" stroke="#94a3b8" stroke-width="1"/>
  <line x1="178" y1="162" x2="178" y2="170" stroke="#94a3b8" stroke-width="1"/>
  <rect x="185" y="155" width="40" height="22" rx="4" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="205" y="170" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#991b1b">A</text>

  <!-- Pair 3: G-C (3 bonds) -->
  <rect x="100" y="202" width="40" height="22" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="120" y="217" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#1e40af">G</text>
  <line x1="140" y1="213" x2="178" y2="213" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="150" y1="209" x2="150" y2="217" stroke="#94a3b8" stroke-width="1"/>
  <line x1="160" y1="209" x2="160" y2="217" stroke="#94a3b8" stroke-width="1"/>
  <line x1="170" y1="209" x2="170" y2="217" stroke="#94a3b8" stroke-width="1"/>
  <rect x="178" y="202" width="40" height="22" rx="4" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="198" y="217" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#991b1b">C</text>

  <!-- Pair 4: C-G (3 bonds) -->
  <rect x="108" y="249" width="40" height="22" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="128" y="264" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#1e40af">C</text>
  <line x1="148" y1="260" x2="186" y2="260" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="158" y1="256" x2="158" y2="264" stroke="#94a3b8" stroke-width="1"/>
  <line x1="168" y1="256" x2="168" y2="264" stroke="#94a3b8" stroke-width="1"/>
  <line x1="178" y1="256" x2="178" y2="264" stroke="#94a3b8" stroke-width="1"/>
  <rect x="186" y="249" width="40" height="22" rx="4" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="206" y="264" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#991b1b">G</text>

  <!-- Pair 5: A-T -->
  <rect x="116" y="296" width="40" height="22" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="136" y="311" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#1e40af">A</text>
  <line x1="156" y1="307" x2="188" y2="307" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="164" y1="303" x2="164" y2="311" stroke="#94a3b8" stroke-width="1"/>
  <line x1="178" y1="303" x2="178" y2="311" stroke="#94a3b8" stroke-width="1"/>
  <rect x="188" y="296" width="40" height="22" rx="4" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="208" y="311" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#991b1b">T</text>

  <!-- Pair 6: G-C -->
  <rect x="105" y="343" width="40" height="22" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="125" y="358" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#1e40af">G</text>
  <line x1="145" y1="354" x2="183" y2="354" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="155" y1="350" x2="155" y2="358" stroke="#94a3b8" stroke-width="1"/>
  <line x1="165" y1="350" x2="165" y2="358" stroke="#94a3b8" stroke-width="1"/>
  <line x1="175" y1="350" x2="175" y2="358" stroke="#94a3b8" stroke-width="1"/>
  <rect x="183" y="343" width="40" height="22" rx="4" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="203" y="358" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#991b1b">C</text>

  <!-- Pair 7: T-A -->
  <rect x="98" y="385" width="40" height="22" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="118" y="400" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#1e40af">T</text>
  <line x1="138" y1="396" x2="176" y2="396" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="148" y1="392" x2="148" y2="400" stroke="#94a3b8" stroke-width="1"/>
  <line x1="166" y1="392" x2="166" y2="400" stroke="#94a3b8" stroke-width="1"/>
  <rect x="176" y="385" width="40" height="22" rx="4" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="196" y="400" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#991b1b">A</text>

  <!-- 3' / 5' labels at bottom -->
  <text x="95" y="430" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#2563eb">3'</text>
  <text x="245" y="430" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#dc2626">5'</text>

  <!-- Direction arrows -->
  <line x1="70" y1="95" x2="70" y2="415" stroke="#3b82f6" stroke-width="2" marker-end="url(#arr)"/>
  <text x="58" y="255" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#3b82f6" transform="rotate(-90, 58, 255)">Coding strand 5'→3'</text>
  <line x1="270" y1="415" x2="270" y2="95" stroke="#dc2626" stroke-width="2" marker-end="url(#arr)"/>
  <text x="282" y="255" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#dc2626" transform="rotate(90, 282, 255)">Template strand 3'→5'</text>

  <!-- === RIGHT: Key Information === -->

  <!-- Base pairing rules box -->
  <rect x="360" y="80" width="400" height="120" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="560" y="105" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#0f172a">Base Pairing Rules</text>

  <!-- A-T pair -->
  <rect x="400" y="118" width="36" height="24" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="418" y="135" text-anchor="middle" font-family="monospace" font-size="15" font-weight="bold" fill="#1e40af">A</text>
  <text x="448" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">══</text>
  <rect x="465" y="118" width="36" height="24" rx="5" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="483" y="135" text-anchor="middle" font-family="monospace" font-size="15" font-weight="bold" fill="#991b1b">T</text>
  <text x="540" y="135" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">2 hydrogen bonds</text>

  <!-- G-C pair -->
  <rect x="400" y="155" width="36" height="24" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="418" y="172" text-anchor="middle" font-family="monospace" font-size="15" font-weight="bold" fill="#1e40af">G</text>
  <text x="448" y="172" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">≡≡</text>
  <rect x="465" y="155" width="36" height="24" rx="5" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="483" y="172" text-anchor="middle" font-family="monospace" font-size="15" font-weight="bold" fill="#991b1b">C</text>
  <text x="540" y="172" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">3 hydrogen bonds (stronger)</text>

  <!-- Key properties box -->
  <rect x="360" y="220" width="400" height="180" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="560" y="248" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#0f172a">Key Properties</text>

  <!-- Properties list -->
  <circle cx="385" cy="275" r="4" fill="#3b82f6"/>
  <text x="398" y="280" font-family="system-ui, sans-serif" font-size="12" fill="#334155"><tspan font-weight="bold">Double-stranded</tspan> — two complementary strands</text>

  <circle cx="385" cy="300" r="4" fill="#3b82f6"/>
  <text x="398" y="305" font-family="system-ui, sans-serif" font-size="12" fill="#334155"><tspan font-weight="bold">Antiparallel</tspan> — strands run in opposite directions</text>

  <circle cx="385" cy="325" r="4" fill="#3b82f6"/>
  <text x="398" y="330" font-family="system-ui, sans-serif" font-size="12" fill="#334155"><tspan font-weight="bold">Redundant</tspan> — each strand is the other's backup</text>

  <circle cx="385" cy="350" r="4" fill="#3b82f6"/>
  <text x="398" y="355" font-family="system-ui, sans-serif" font-size="12" fill="#334155"><tspan font-weight="bold">Stable</tspan> — can persist for thousands of years</text>

  <circle cx="385" cy="375" r="4" fill="#3b82f6"/>
  <text x="398" y="380" font-family="system-ui, sans-serif" font-size="12" fill="#334155"><tspan font-weight="bold">GC-rich = stronger</tspan> — 3 bonds vs 2 (matters in PCR!)</text>

  <!-- Why it matters box -->
  <rect x="360" y="418" width="400" height="80" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="380" y="443" font-family="system-ui, sans-serif" font-size="12" fill="#1e40af" font-weight="bold">In bioinformatics:</text>
  <text x="380" y="462" font-family="system-ui, sans-serif" font-size="11" fill="#334155">We store only the coding strand (5'→3'). The other strand</text>
  <text x="380" y="478" font-family="system-ui, sans-serif" font-size="11" fill="#334155">is implied. Sequencing reads can come from either strand —</text>
  <text x="380" y="494" font-family="system-ui, sans-serif" font-size="11" fill="#334155">that's why <tspan font-family="monospace" fill="#1e40af">reverse_complement()</tspan> is used so often.</text>
</svg>
