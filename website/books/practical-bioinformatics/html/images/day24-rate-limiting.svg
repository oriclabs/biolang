<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
  </defs>
  <rect width="800" height="340" rx="12" fill="url(#bg)"/>
  <text x="400" y="36" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#0f172a">Rate Limiting Strategy</text>

  <!-- Without rate limiting -->
  <text x="200" y="68" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="600" fill="#dc2626">Without Rate Limiting</text>

  <rect x="40" y="80" width="320" height="230" rx="8" fill="white" stroke="#fecaca" stroke-width="1.5"/>

  <!-- Rapid burst bars -->
  <text x="60" y="105" font-family="system-ui" font-size="11" fill="#64748b">t=0ms</text>
  <rect x="120" y="92" width="180" height="16" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="220" y="104" text-anchor="middle" font-family="system-ui" font-size="10" fill="#1e40af">Gene 1: NCBI</text>

  <text x="60" y="125" font-family="system-ui" font-size="11" fill="#64748b">t=5ms</text>
  <rect x="120" y="112" width="180" height="16" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="220" y="124" text-anchor="middle" font-family="system-ui" font-size="10" fill="#166534">Gene 1: UniProt</text>

  <text x="60" y="145" font-family="system-ui" font-size="11" fill="#64748b">t=10ms</text>
  <rect x="120" y="132" width="180" height="16" rx="4" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1"/>
  <text x="220" y="144" text-anchor="middle" font-family="system-ui" font-size="10" fill="#5b21b6">Gene 1: KEGG</text>

  <text x="60" y="165" font-family="system-ui" font-size="11" fill="#64748b">t=15ms</text>
  <rect x="120" y="152" width="180" height="16" rx="4" fill="#fef9c3" stroke="#eab308" stroke-width="1"/>
  <text x="220" y="164" text-anchor="middle" font-family="system-ui" font-size="10" fill="#854d0e">Gene 1: GO</text>

  <text x="60" y="185" font-family="system-ui" font-size="11" fill="#64748b">t=20ms</text>
  <rect x="120" y="172" width="180" height="16" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="220" y="184" text-anchor="middle" font-family="system-ui" font-size="10" fill="#1e40af">Gene 2: NCBI</text>

  <text x="200" y="210" text-anchor="middle" font-family="system-ui" font-size="11" fill="#94a3b8" font-style="italic">... rapid burst ...</text>

  <!-- Error markers -->
  <rect x="80" y="225" width="240" height="35" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="200" y="240" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#dc2626">HTTP 429 at gene 8</text>
  <text x="200" y="254" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#dc2626">Temporary ban</text>

  <rect x="100" y="270" width="200" height="28" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="200" y="289" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="700" fill="#dc2626">FAILED</text>

  <!-- With rate limiting -->
  <text x="600" y="68" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="600" fill="#166534">With Rate Limiting</text>

  <rect x="440" y="80" width="320" height="230" rx="8" fill="white" stroke="#bbf7d0" stroke-width="1.5"/>

  <text x="460" y="105" font-family="system-ui" font-size="11" fill="#64748b">t=0ms</text>
  <rect x="530" y="92" width="180" height="16" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="620" y="104" text-anchor="middle" font-family="system-ui" font-size="10" fill="#1e40af">Gene 1: NCBI</text>

  <text x="460" y="128" font-family="system-ui" font-size="11" fill="#64748b">+200ms</text>
  <rect x="530" y="115" width="180" height="16" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="620" y="127" text-anchor="middle" font-family="system-ui" font-size="10" fill="#166534">Gene 1: UniProt</text>

  <text x="460" y="151" font-family="system-ui" font-size="11" fill="#64748b">+200ms</text>
  <rect x="530" y="138" width="180" height="16" rx="4" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1"/>
  <text x="620" y="150" text-anchor="middle" font-family="system-ui" font-size="10" fill="#5b21b6">Gene 1: KEGG</text>

  <text x="460" y="174" font-family="system-ui" font-size="11" fill="#64748b">+200ms</text>
  <rect x="530" y="161" width="180" height="16" rx="4" fill="#fef9c3" stroke="#eab308" stroke-width="1"/>
  <text x="620" y="173" text-anchor="middle" font-family="system-ui" font-size="10" fill="#854d0e">Gene 1: GO</text>

  <text x="460" y="197" font-family="system-ui" font-size="11" fill="#64748b">+500ms</text>
  <rect x="530" y="184" width="180" height="16" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="620" y="196" text-anchor="middle" font-family="system-ui" font-size="10" fill="#1e40af">Gene 2: NCBI</text>

  <text x="600" y="218" text-anchor="middle" font-family="system-ui" font-size="11" fill="#94a3b8" font-style="italic">... spaced requests ...</text>

  <rect x="480" y="232" width="240" height="35" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="600" y="247" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#166534">All 50 genes complete</text>
  <text x="600" y="261" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#166534">Total: ~25 seconds</text>

  <rect x="500" y="275" width="200" height="28" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="600" y="294" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="700" fill="#166534">SUCCESS</text>
</svg>