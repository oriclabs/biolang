<svg viewBox="0 0 800 440" xmlns="http://www.w3.org/2000/svg" style="background: #fff;">
  <defs>
    <linearGradient id="dsBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <marker id="dsArr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="800" height="440" fill="url(#dsBg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#0f172a">Choosing the Right Data Structure</text>
  <text x="400" y="52" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#64748b">A decision tree for common bioinformatics data</text>

  <!-- Level 0: Root question -->
  <rect x="300" y="72" width="200" height="42" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="400" y="98" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#1e40af">What kind of data?</text>

  <!-- Arrows from root -->
  <line x1="340" y1="114" x2="200" y2="160" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#dsArr)"/>
  <line x1="460" y1="114" x2="600" y2="160" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#dsArr)"/>

  <!-- Level 1 Left: Named fields? -->
  <rect x="100" y="165" width="190" height="42" rx="8" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="195" y="191" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#854d0e">Named fields?</text>
  <text x="250" y="152" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#166534" font-weight="bold">Yes</text>

  <!-- Level 1 Right: Ordered? -->
  <rect x="505" y="165" width="190" height="42" rx="8" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="600" y="191" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#854d0e">Ordered?</text>
  <text x="540" y="152" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#991b1b" font-weight="bold">No</text>

  <!-- Level 2 Left: Multiple rows? -->
  <line x1="195" y1="207" x2="195" y2="255" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#dsArr)"/>
  <rect x="100" y="260" width="190" height="42" rx="8" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="195" y="286" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#854d0e">Multiple rows?</text>

  <!-- Level 2 Right: Unique membership? -->
  <line x1="600" y1="207" x2="600" y2="255" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#dsArr)"/>
  <text x="615" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#991b1b" font-weight="bold">No</text>
  <rect x="505" y="260" width="190" height="42" rx="8" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="600" y="286" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#854d0e">Unique membership?</text>

  <!-- Ordered? -> Yes -> List (direct) -->
  <line x1="505" y1="195" x2="430" y2="195" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="430" y1="195" x2="430" y2="355" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#dsArr)"/>
  <text x="460" y="190" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#166534" font-weight="bold">Yes</text>

  <!-- Multiple rows -> Yes -> Table -->
  <line x1="130" y1="302" x2="80" y2="355" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#dsArr)"/>
  <text x="88" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#166534" font-weight="bold">Yes</text>

  <!-- Multiple rows -> No -> Record -->
  <line x1="260" y1="302" x2="280" y2="355" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#dsArr)"/>
  <text x="280" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#991b1b" font-weight="bold">No</text>

  <!-- Unique membership -> Yes -> Set -->
  <line x1="560" y1="302" x2="540" y2="355" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#dsArr)"/>
  <text x="537" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#166534" font-weight="bold">Yes</text>

  <!-- Unique membership -> No -> List (same as above) -->
  <line x1="640" y1="302" x2="680" y2="355" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#dsArr)"/>
  <text x="672" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#991b1b" font-weight="bold">No</text>

  <!-- Leaf nodes -->
  <!-- Table (green) -->
  <rect x="20" y="365" width="130" height="55" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="85" y="389" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#166534">Table</text>
  <text x="85" y="407" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#166534">DE results, QC metrics</text>

  <!-- Record (purple) -->
  <rect x="220" y="365" width="130" height="55" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="285" y="389" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#5b21b6">Record</text>
  <text x="285" y="407" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#5b21b6">Gene annotation</text>

  <!-- List (blue) -->
  <rect x="370" y="365" width="130" height="55" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="435" y="389" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#1e40af">List</text>
  <text x="435" y="407" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#1e40af">Values, sequences</text>

  <!-- Set (orange) -->
  <rect x="480" y="365" width="130" height="55" rx="8" fill="#fed7aa" stroke="#f97316" stroke-width="1.5"/>
  <text x="545" y="389" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#9a3412">Set</text>
  <text x="545" y="407" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#9a3412">Gene panels, GO</text>

  <!-- List again for the "No" branch from unique membership -->
  <rect x="630" y="365" width="130" height="55" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="695" y="389" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#1e40af">List</text>
  <text x="695" y="407" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#1e40af">Sample queues</text>
</svg>
