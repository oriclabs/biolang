<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" style="background: #fff;">
  <defs>
    <linearGradient id="ccBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <marker id="ccArr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="480" fill="url(#ccBg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#0f172a">The Cell as a Computer</text>
  <text x="400" y="52" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">Biology maps cleanly onto computing concepts</text>

  <!-- === CELL BOUNDARY === -->
  <rect x="30" y="70" width="740" height="360" rx="20" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="400" y="92" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#64748b">Cell = Computer (the whole system)</text>

  <!-- === NUCLEUS === -->
  <rect x="50" y="105" width="320" height="240" rx="16" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="210" y="128" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1e40af">Nucleus = Server Room</text>
  <text x="210" y="144" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">(protected access — critical data stays here)</text>

  <!-- DNA Box -->
  <rect x="75" y="160" width="270" height="70" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="95" y="182" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#1e40af">DNA = Hard Drive</text>
  <text x="95" y="200" font-family="monospace" font-size="12" fill="#3b82f6">ATCGATCG... (3.2 billion bases)</text>
  <text x="95" y="218" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Master copy, never leaves the nucleus</text>

  <!-- Arrow: DNA → RNA -->
  <line x1="210" y1="230" x2="210" y2="255" stroke="#6b7280" stroke-width="2" marker-end="url(#ccArr)"/>
  <text x="240" y="248" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280">copy</text>

  <!-- RNA Box -->
  <rect x="75" y="260" width="270" height="70" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="95" y="282" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#92400e">RNA = RAM (working copy)</text>
  <text x="95" y="300" font-family="system-ui, sans-serif" font-size="11" fill="#d97706">Temporary, disposable — gets degraded after use</text>
  <text x="95" y="316" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Many copies made on demand</text>

  <!-- Arrow: RNA exported out of nucleus -->
  <line x1="345" y1="295" x2="415" y2="295" stroke="#6b7280" stroke-width="2.5" marker-end="url(#ccArr)"/>
  <text x="380" y="285" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#6b7280">export</text>

  <!-- === RIBOSOME === -->
  <rect x="425" y="130" width="170" height="100" rx="14" fill="#fce7f3" stroke="#ec4899" stroke-width="2"/>
  <text x="510" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#9d174d">Ribosome = CPU</text>
  <text x="510" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#be185d">Reads RNA instructions</text>
  <text x="510" y="193" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#be185d">Builds proteins amino</text>
  <text x="510" y="208" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#be185d">acid by amino acid</text>

  <!-- Arrow: RNA to ribosome -->
  <path d="M430,295 Q410,295 410,250 Q410,180 425,180" stroke="#6b7280" stroke-width="2" fill="none" marker-end="url(#ccArr)"/>

  <!-- Arrow: Ribosome → Protein -->
  <line x1="510" y1="230" x2="510" y2="260" stroke="#6b7280" stroke-width="2.5" marker-end="url(#ccArr)"/>
  <text x="535" y="250" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#6b7280">build</text>

  <!-- === PROTEIN === -->
  <rect x="425" y="270" width="330" height="145" rx="14" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="590" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#065f46">Protein = Running Program</text>
  <text x="590" y="313" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#059669">Does the actual work</text>

  <!-- Protein examples in two columns -->
  <circle cx="450" cy="338" r="4" fill="#10b981"/>
  <text x="462" y="343" font-family="system-ui, sans-serif" font-size="11" fill="#334155"><tspan font-weight="bold">Hemoglobin</tspan> — carries oxygen</text>

  <circle cx="450" cy="360" r="4" fill="#10b981"/>
  <text x="462" y="365" font-family="system-ui, sans-serif" font-size="11" fill="#334155"><tspan font-weight="bold">Insulin</tspan> — regulates blood sugar</text>

  <circle cx="450" cy="382" r="4" fill="#10b981"/>
  <text x="462" y="387" font-family="system-ui, sans-serif" font-size="11" fill="#334155"><tspan font-weight="bold">p53</tspan> — suppresses tumors</text>

  <circle cx="450" cy="404" r="4" fill="#10b981"/>
  <text x="462" y="409" font-family="system-ui, sans-serif" font-size="11" fill="#334155"><tspan font-weight="bold">Antibodies</tspan> — fight infection</text>

  <!-- === BOTTOM SUMMARY === -->
  <rect x="50" y="440" width="700" height="30" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="400" y="460" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#334155">
    <tspan font-weight="bold" fill="#1e40af">DNA</tspan>
    <tspan fill="#6b7280"> ──transcribe──▸ </tspan>
    <tspan font-weight="bold" fill="#92400e">RNA</tspan>
    <tspan fill="#6b7280"> ──translate──▸ </tspan>
    <tspan font-weight="bold" fill="#065f46">Protein</tspan>
    <tspan fill="#6b7280">    (the Central Dogma)</tspan>
  </text>

  <!-- Scale note -->
  <rect x="610" y="130" width="150" height="70" rx="8" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="685" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#5b21b6">Scale:</text>
  <text x="685" y="166" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6d28d9">~20,000 genes active</text>
  <text x="685" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6d28d9">simultaneously — like a</text>
  <text x="685" y="194" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6d28d9">20K microservice cluster</text>
</svg>
