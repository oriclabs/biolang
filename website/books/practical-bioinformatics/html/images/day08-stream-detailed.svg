<svg viewBox="0 0 800 210" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="800" height="210" rx="12" fill="url(#bg)"/>
  <text x="400" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#0f172a">Stream Operations: Lazy vs Terminal</text>
  <text x="400" y="55" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#64748b">Orange = source, Green = lazy transformation, Blue = terminal (triggers flow)</text>

  <!-- fastq source -->
  <rect x="20" y="90" width="100" height="50" rx="8" fill="#fed7aa" stroke="#f97316" stroke-width="1.5"/>
  <text x="70" y="120" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#9a3412">fastq()</text>

  <line x1="120" y1="115" x2="155" y2="115" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="137" y="108" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748b">stream</text>

  <!-- filter -->
  <rect x="160" y="90" width="110" height="50" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="215" y="120" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#166534">filter()</text>

  <line x1="270" y1="115" x2="305" y2="115" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="287" y="108" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748b">stream</text>

  <!-- map -->
  <rect x="310" y="90" width="110" height="50" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="365" y="120" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#166534">map()</text>

  <line x1="420" y1="115" x2="455" y2="115" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="437" y="108" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748b">stream</text>

  <!-- take -->
  <rect x="460" y="90" width="110" height="50" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="515" y="120" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#166534">take()</text>

  <line x1="570" y1="115" x2="605" y2="115" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="587" y="108" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748b">stream</text>

  <!-- collect -->
  <rect x="610" y="90" width="110" height="50" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="665" y="120" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#1e40af">collect()</text>

  <line x1="720" y1="115" x2="755" y2="115" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="737" y="108" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748b">List</text>

  <!-- result -->
  <rect x="730" y="95" width="55" height="40" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="757" y="120" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#1e40af">result</text>
</svg>