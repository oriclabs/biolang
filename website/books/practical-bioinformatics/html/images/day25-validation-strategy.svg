<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="800" height="400" rx="12" fill="url(#bg)"/>
  <text x="400" y="36" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#0f172a">Input Validation Failure-Rate Strategy</text>

  <!-- Start -->
  <rect x="300" y="55" width="200" height="42" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="400" y="81" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="600" fill="#1e40af">Start: N input files</text>

  <line x1="400" y1="97" x2="400" y2="120" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Validate -->
  <rect x="300" y="125" width="200" height="42" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="400" y="151" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="600" fill="#1e40af">Validate all files</text>

  <line x1="400" y1="167" x2="400" y2="195" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Decision diamond (using rotated square) -->
  <polygon points="400,195 440,220 400,245 360,220" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="400" y="224" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#854d0e">Failures?</text>

  <!-- 0 failures -->
  <line x1="360" y1="220" x2="130" y2="220" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="250" y="213" text-anchor="middle" font-family="system-ui" font-size="10" fill="#64748b">0 failures</text>

  <rect x="20" y="200" width="160" height="48" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="100" y="222" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#166534">Process all files</text>
  <text x="100" y="238" text-anchor="middle" font-family="system-ui" font-size="11" fill="#166534">Full report</text>

  <!-- <5% failures -->
  <line x1="400" y1="245" x2="250" y2="300" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="300" y="268" text-anchor="middle" font-family="system-ui" font-size="10" fill="#64748b">&lt;5% failures</text>

  <rect x="140" y="305" width="200" height="60" rx="8" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="240" y="328" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#854d0e">Log warnings</text>
  <text x="240" y="344" text-anchor="middle" font-family="system-ui" font-size="11" fill="#854d0e">Skip bad files, process rest</text>
  <text x="240" y="358" text-anchor="middle" font-family="system-ui" font-size="11" fill="#92400e">Partial report + error log</text>

  <!-- 5-50% failures -->
  <line x1="440" y1="220" x2="550" y2="300" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="525" y="262" text-anchor="middle" font-family="system-ui" font-size="10" fill="#64748b">5-50% failures</text>

  <rect x="440" y="305" width="200" height="60" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="540" y="325" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#dc2626">ABORT</text>
  <text x="540" y="341" text-anchor="middle" font-family="system-ui" font-size="11" fill="#dc2626">Too many bad inputs</text>
  <text x="540" y="357" text-anchor="middle" font-family="system-ui" font-size="11" fill="#b91c1c">Investigate data source</text>

  <!-- >50% failures -->
  <line x1="440" y1="220" x2="700" y2="300" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="610" y="248" text-anchor="middle" font-family="system-ui" font-size="10" fill="#64748b">&gt;50% failures</text>

  <rect x="620" y="305" width="160" height="60" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="700" y="325" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="700" fill="#dc2626">ABORT</text>
  <text x="700" y="341" text-anchor="middle" font-family="system-ui" font-size="11" fill="#dc2626">Systematic problem</text>
  <text x="700" y="357" text-anchor="middle" font-family="system-ui" font-size="11" fill="#b91c1c">Check upstream process</text>
</svg>