<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="800" height="380" rx="12" fill="url(#bg)"/>
  <text x="400" y="38" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#0f172a">Genomics File Format Pipeline</text>
  <text x="400" y="58" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#64748b">From raw reads to annotated variants</text>

  <!-- Main pipeline row (y=160) -->
  <!-- Sequencer -->
  <rect x="20" y="140" width="120" height="50" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="80" y="162" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#1e40af">Sequencer</text>
  <text x="80" y="178" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#3b82f6">FASTQ</text>

  <!-- Arrow -->
  <line x1="140" y1="165" x2="175" y2="165" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Alignment -->
  <rect x="180" y="140" width="120" height="50" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="240" y="162" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#166534">Alignment</text>
  <text x="240" y="178" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#22c55e">SAM/BAM</text>

  <!-- Arrow -->
  <line x1="300" y1="165" x2="335" y2="165" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Variant Calling -->
  <rect x="340" y="140" width="140" height="50" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="410" y="162" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#5b21b6">Variant Calling</text>
  <text x="410" y="178" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b5cf6">VCF</text>

  <!-- Arrow -->
  <line x1="480" y1="165" x2="515" y2="165" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Annotation -->
  <rect x="520" y="140" width="130" height="50" rx="8" fill="#fed7aa" stroke="#f97316" stroke-width="1.5"/>
  <text x="585" y="162" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#9a3412">Annotation</text>
  <text x="585" y="178" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#f97316">Annotated VCF</text>

  <!-- Arrow -->
  <line x1="650" y1="165" x2="685" y2="165" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Report -->
  <rect x="690" y="140" width="90" height="50" rx="8" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="735" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#854d0e">Report</text>

  <!-- Input files (top row) -->
  <!-- Reference FASTA -->
  <rect x="155" y="260" width="170" height="44" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="240" y="278" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#1e40af">Reference Genome</text>
  <text x="240" y="294" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#3b82f6">FASTA</text>
  <!-- Arrow up to Alignment -->
  <line x1="240" y1="260" x2="240" y2="195" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- GFF/GTF -->
  <rect x="480" y="260" width="170" height="44" rx="8" fill="#fed7aa" stroke="#f97316" stroke-width="1.5"/>
  <text x="565" y="278" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#9a3412">Gene Models</text>
  <text x="565" y="294" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#f97316">GFF / GTF</text>
  <!-- Arrow up to Annotation -->
  <line x1="565" y1="260" x2="575" y2="195" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- BED -->
  <rect x="330" y="330" width="170" height="44" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="415" y="348" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#5b21b6">Regions of Interest</text>
  <text x="415" y="364" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b5cf6">BED</text>
  <!-- Arrow up to Variant Calling -->
  <line x1="415" y1="330" x2="415" y2="195" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
</svg>