<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" style="background: #fff;">
  <defs>
    <linearGradient id="fpBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <marker id="fpArr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#6b7280"/>
    </marker>
    <marker id="fpArrDown" markerWidth="7" markerHeight="10" refX="3.5" refY="10" orient="auto">
      <polygon points="0 0,3.5 10,7 0" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" fill="url(#fpBg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#0f172a">Why You Can't Use Food Protein Directly</text>
  <text x="400" y="52" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">Your body breaks down food protein and rebuilds from DNA instructions</text>

  <!-- === STEP 1: Food Protein === -->
  <rect x="30" y="75" width="180" height="130" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="120" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#92400e">What You Eat</text>
  <!-- Food icons as simple shapes -->
  <ellipse cx="75" cy="135" rx="25" ry="18" fill="#fde68a" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="75" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#92400e">egg</text>
  <ellipse cx="130" cy="135" rx="25" ry="18" fill="#fed7aa" stroke="#f97316" stroke-width="1.5"/>
  <text x="130" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#9a3412">chicken</text>
  <ellipse cx="165" cy="135" rx="20" ry="18" fill="#d9f99d" stroke="#84cc16" stroke-width="1.5"/>
  <text x="165" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#3f6212">lentil</text>
  <text x="120" y="172" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Complex 3D proteins</text>
  <text x="120" y="186" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">(chicken myosin, albumin...)</text>

  <!-- Arrow 1 -->
  <line x1="210" y1="140" x2="255" y2="140" stroke="#6b7280" stroke-width="2.5" marker-end="url(#fpArr)"/>

  <!-- === STEP 2: Digestion === -->
  <rect x="265" y="75" width="160" height="130" rx="12" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="345" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#991b1b">Digestion</text>
  <!-- Scissors icon -->
  <text x="345" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" fill="#ef4444">&#x2702;</text>
  <text x="345" y="158" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Stomach acid +</text>
  <text x="345" y="172" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">enzymes shred</text>
  <text x="345" y="186" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">proteins completely</text>

  <!-- Arrow 2 -->
  <line x1="425" y1="140" x2="470" y2="140" stroke="#6b7280" stroke-width="2.5" marker-end="url(#fpArr)"/>

  <!-- === STEP 3: Amino Acids === -->
  <rect x="480" y="75" width="140" height="130" rx="12" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="550" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#3730a3">Amino Acids</text>
  <!-- Small colored circles representing amino acids -->
  <circle cx="510" cy="125" r="10" fill="#fca5a5"/>
  <text x="510" y="129" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#fff">M</text>
  <circle cx="535" cy="125" r="10" fill="#93c5fd"/>
  <text x="535" y="129" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#fff">A</text>
  <circle cx="560" cy="125" r="10" fill="#86efac"/>
  <text x="560" y="129" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#fff">K</text>
  <circle cx="585" cy="125" r="10" fill="#fde68a"/>
  <text x="585" y="129" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#fff">D</text>
  <circle cx="510" cy="150" r="10" fill="#c4b5fd"/>
  <text x="510" y="154" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#fff">P</text>
  <circle cx="535" cy="150" r="10" fill="#fbcfe8"/>
  <text x="535" y="154" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#fff">L</text>
  <circle cx="560" cy="150" r="10" fill="#a5f3fc"/>
  <text x="560" y="154" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#fff">G</text>
  <circle cx="585" cy="150" r="10" fill="#fecaca"/>
  <text x="585" y="154" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#fff">R</text>
  <text x="550" y="182" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">20 types of building</text>
  <text x="550" y="196" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">blocks in the blood</text>

  <!-- Arrow down from amino acids -->
  <line x1="550" y1="205" x2="550" y2="245" stroke="#6b7280" stroke-width="2.5" marker-end="url(#fpArr)"/>
  <text x="575" y="230" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">absorbed</text>

  <!-- === STEP 4: Your DNA reads === -->
  <rect x="440" y="255" width="220" height="60" rx="12" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="550" y="278" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1e40af">Your DNA Blueprint</text>
  <text x="550" y="296" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#3b82f6">Ribosomes read YOUR genes</text>

  <!-- Arrow down to your proteins -->
  <line x1="550" y1="315" x2="550" y2="345" stroke="#6b7280" stroke-width="2.5" marker-end="url(#fpArr)"/>

  <!-- === STEP 5: Your Proteins === -->
  <rect x="400" y="350" width="300" height="55" rx="12" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="550" y="373" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#065f46">YOUR Proteins</text>
  <text x="550" y="393" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#059669">Hemoglobin, Insulin, Collagen, Antibodies, p53...</text>

  <!-- === LEFT SIDE: The Analogy === -->
  <rect x="30" y="235" width="370" height="170" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="215" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#0f172a">The LEGO Analogy</text>

  <!-- Analogy items -->
  <circle cx="55" cy="287" r="4" fill="#f59e0b"/>
  <text x="68" y="292" font-family="system-ui, sans-serif" font-size="12" fill="#334155"><tspan font-weight="bold">Food protein</tspan> = a pre-built LEGO set (someone else's design)</text>

  <circle cx="55" cy="312" r="4" fill="#ef4444"/>
  <text x="68" y="317" font-family="system-ui, sans-serif" font-size="12" fill="#334155"><tspan font-weight="bold">Digestion</tspan> = breaking it apart into individual bricks</text>

  <circle cx="55" cy="337" r="4" fill="#6366f1"/>
  <text x="68" y="342" font-family="system-ui, sans-serif" font-size="12" fill="#334155"><tspan font-weight="bold">Amino acids</tspan> = the 20 types of LEGO bricks</text>

  <circle cx="55" cy="362" r="4" fill="#3b82f6"/>
  <text x="68" y="367" font-family="system-ui, sans-serif" font-size="12" fill="#334155"><tspan font-weight="bold">Your DNA</tspan> = YOUR instruction manual</text>

  <circle cx="55" cy="387" r="4" fill="#10b981"/>
  <text x="68" y="392" font-family="system-ui, sans-serif" font-size="12" fill="#334155"><tspan font-weight="bold">Your proteins</tspan> = completely different structures</text>

  <!-- X mark on direct path -->
  <rect x="640" y="75" width="130" height="60" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="705" y="95" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" fill="#dc2626">&#x2717;</text>
  <text x="705" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#991b1b">Can't use chicken</text>
  <text x="705" y="127" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#991b1b">myosin as-is!</text>
</svg>
