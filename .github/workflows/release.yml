name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: biolang-linux-x86_64.tar.gz
            binary: bl
            lsp_binary: bl-lsp
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: biolang-macos-x86_64.tar.gz
            binary: bl
            lsp_binary: bl-lsp
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: biolang-macos-aarch64.tar.gz
            binary: bl
            lsp_binary: bl-lsp
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: biolang-windows-x86_64.zip
            binary: bl.exe
            lsp_binary: bl-lsp.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }} -p bl-cli -p bl-lsp

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} dist/
          cp target/${{ matrix.target }}/release/${{ matrix.lsp_binary }} dist/
          cp LICENSE dist/
          cp README.md dist/
          cd dist && tar czf ../${{ matrix.archive }} *

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" dist/
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.lsp_binary }}" dist/
          Copy-Item LICENSE dist/
          Copy-Item README.md dist/
          Compress-Archive -Path dist/* -DestinationPath ${{ matrix.archive }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) | while read f; do
            sha256sum "$f" >> checksums.sha256
          done
          cat checksums.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            checksums.sha256
