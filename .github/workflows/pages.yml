name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'books/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install mdBook
        run: |
          tag=$(curl -s https://api.github.com/repos/rust-lang/mdBook/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
          curl -fsSL "https://github.com/rust-lang/mdBook/releases/download/${tag}/mdbook-${tag}-x86_64-unknown-linux-gnu.tar.gz" | tar xz
          sudo mv mdbook /usr/local/bin/

      - name: Build Tailwind CSS
        working-directory: website
        run: |
          npm ci
          npx tailwindcss -i src/input.css -o assets/styles.css --minify

      - name: Install mdBook preprocessors
        run: cargo install mdbook-mermaid --no-default-features 2>/dev/null || true

      - name: Build books
        run: |
          mdbook build books/practical-bioinformatics/book
          mdbook build books/biostatistics/book

      - uses: actions/upload-pages-artifact@v3
        with:
          path: website

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
